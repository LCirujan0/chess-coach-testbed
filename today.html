<style>
  /* Page chrome = shared shell.css + nav.css. */
  h1, .page-title, .nav-brand-name, .title, .stat-num { font-family:"Plus Jakarta Sans","Inter",sans-serif; }


  /* top greeting */
  .top { display:flex; align-items:flex-start; justify-content:space-between; gap:12px; flex-wrap:wrap; margin-bottom:4px; }
  .eyebrow { font-size:10.5px; text-transform:uppercase; letter-spacing:.12em; font-weight:700; color:var(--accent); }
  .title { font-weight:800; font-size:26px; letter-spacing:-.02em; margin:4px 0 2px; line-height:1.1; }
  .sub { color:var(--muted); font-size:13px; }
  .chips { display:flex; gap:7px; flex-wrap:wrap; }
  .chip { display:inline-flex; align-items:center; gap:6px; font-size:12px; font-weight:700; padding:5px 11px; border-radius:var(--r-pill); text-decoration:none; }
  .chip.streak { background:#FBF1E3; color:var(--warn); }
  .chip.tier { background:#EBF1FB; color:#3F6FB0; }

  /* coach note */
  .coachnote { display:flex; gap:10px; align-items:flex-start; background:var(--accent-soft); border:1px solid var(--accent-line); border-radius:13px; padding:13px 15px; margin:16px 0; text-decoration:none; color:inherit; }
  .coachnote:hover { filter:brightness(.99); }
  .ava { width:26px; height:26px; border-radius:8px; background:linear-gradient(140deg,var(--accent),var(--accent-2)); display:flex; align-items:center; justify-content:center; color:#fff; font-family:"Plus Jakarta Sans"; font-weight:700; font-size:12px; flex-shrink:0; }
  .coachnote .txt { font-size:13px; } .coachnote .txt b { font-family:"Plus Jakarta Sans"; font-weight:700; }

  /* session card */
  .session { background:var(--surface); border:1px solid var(--line); border-radius:15px; padding:18px; box-shadow:0 16px 34px -26px rgba(30,40,70,.4); }
  .session .sh { display:flex; align-items:center; justify-content:space-between; margin-bottom:6px; }
  .session .sh .t { font-family:"Plus Jakarta Sans"; font-weight:700; font-size:15px; }
  .session .sh .m { font-size:12px; color:var(--muted); font-family:"Spline Sans Mono"; }
  .block { display:flex; align-items:center; gap:12px; padding:11px 8px; border-radius:11px; cursor:pointer; text-decoration:none; color:inherit; border:none; background:none; width:100%; text-align:left; font:inherit; }
  .block:hover { background:var(--surface2); }
  .block .ic { width:34px; height:34px; border-radius:10px; background:var(--surface2); display:flex; align-items:center; justify-content:center; flex-shrink:0; }
  .block .ic svg { width:18px; height:18px; stroke:var(--accent); fill:none; stroke-width:1.8; }
  .block .bd { flex:1; min-width:0; } .block .bd b { font-size:13.5px; font-family:"Plus Jakarta Sans"; font-weight:700; } .block .bd small { display:block; color:var(--muted); font-size:11.5px; }
  .block .ct { font-family:"Spline Sans Mono"; font-size:12px; color:var(--muted); }
  .block .go { color:var(--muted); font-size:15px; margin-left:4px; }
  /* locked "coming soon" rows — never sequenced, never counted */
  .coming-label { font-size:10.5px; font-weight:700; text-transform:uppercase; letter-spacing:.06em; color:var(--muted); margin-bottom:6px; }
  .coming-wrap { margin-top:14px; padding-top:12px; border-top:1px solid var(--line); }
  .block.locked { opacity:.55; cursor:default; }
  .block.locked .ct { font-family:"Inter",sans-serif; font-weight:700; }

  /* plan-today focus sentence */
  .plan-focus { font-size:13px; color:var(--ink); margin:0 0 10px; padding:9px 12px; background:var(--accent-soft); border-left:3px solid var(--accent); border-radius:0 8px 8px 0; line-height:1.45; }
  .plan-focus b { font-family:"Plus Jakarta Sans",sans-serif; }
  .plan-focus.plan-focus-muted { color:var(--muted); background:var(--surface2); border-left-color:var(--surface3); font-style:italic; }
  /* Mastery milestones (retention #7) */
  .milestones { margin-top:14px; }
  .ms-h { font-size:10.5px; font-weight:700; letter-spacing:.12em; text-transform:uppercase; color:var(--muted); margin-bottom:8px; }
  .ms-row { display:flex; flex-wrap:wrap; gap:7px; }
  .ms-chip { display:inline-flex; align-items:center; gap:6px; font-size:12px; font-weight:600; padding:5px 11px; border-radius:var(--r-pill); background:var(--surface2); color:var(--ink); border:1px solid var(--line); }
  .ms-chip.ms-new { background:var(--accent-soft); border-color:var(--accent-line); color:var(--accent); }
  .ms-dot { width:6px; height:6px; border-radius:50%; background:var(--accent); animation:ms-pulse 1.6s ease-out infinite; }
  @keyframes ms-pulse { 0% { box-shadow:0 0 0 0 rgba(47,158,118,.5); } 70% { box-shadow:0 0 0 6px rgba(47,158,118,0); } 100% { box-shadow:0 0 0 0 rgba(47,158,118,0); } }
  /* unlocked endgame extra block (when not the focus) */
  .extra-section { margin-top:14px; background:var(--surface); border:1px solid var(--line); border-radius:15px; padding:14px 18px; box-shadow:0 8px 20px -18px rgba(30,40,70,.3); }
  .extra-section .sh { display:flex; align-items:center; justify-content:space-between; margin-bottom:6px; }
  .extra-section .sh .t { font-family:"Plus Jakarta Sans"; font-weight:700; font-size:14px; }
  .extra-section .sh .m { font-size:11.5px; color:var(--muted); }

  .btn { font-family:"Plus Jakarta Sans"; font-weight:700; font-size:14px; padding:13px 16px; border-radius:12px; border:1px solid transparent; cursor:pointer; width:100%; }
  .btn.primary { background:var(--accent); color:#fff; box-shadow:0 10px 22px -10px var(--accent); transition:filter .15s ease; text-decoration:none; display:block; text-align:center; }
  .btn.primary:hover { filter:brightness(1.06); }
  .btn.primary:active { transform:translateY(1px); }
  .btn.ghost { background:var(--surface); border:1px solid var(--line); color:var(--ink); text-decoration:none; display:block; text-align:center; }
  .btn.ghost:hover { background:var(--surface2); }

  /* progress glance */
  .glance { display:flex; align-items:center; gap:14px; background:var(--surface); border:1px solid var(--line); border-radius:13px; padding:14px 16px; margin-top:14px; cursor:pointer; text-decoration:none; color:inherit; }
  .glance:hover { background:var(--surface2); }
  .ring { width:50px; height:50px; flex-shrink:0; }
  .glance .num { font-family:"Plus Jakarta Sans"; font-size:22px; font-weight:800; } .glance .num small { font-size:12px; color:var(--pos); font-weight:700; }
  .glance .gl-sub { font-size:11.5px; color:var(--muted); }
  .glance .go { margin-left:auto; color:var(--accent); font-size:12px; font-weight:700; }

  /* mid / empty states */
  .mid { text-align:center; padding:26px 18px; background:var(--surface); border:1px solid var(--line); border-radius:var(--r-card); box-shadow:0 16px 36px -26px rgba(20,30,55,.22); margin-top:14px; }
  .mid .ic { width:44px; height:44px; border-radius:13px; background:var(--accent-soft); color:var(--accent); display:flex; align-items:center; justify-content:center; margin:0 auto 12px; }
  .mid .ic.done { background:var(--pos-soft); color:var(--pos); }
  .mid h2 { font-size:20px; font-weight:800; letter-spacing:-.01em; }
  .mid p { font-size:13px; color:var(--muted); max-width:340px; margin:6px auto 16px; }
  .mid .btn { width:auto; display:inline-block; padding:12px 22px; }

  /* error banner (raw error guardrail) */
  .ebanner { background:var(--bad-soft); border:1px solid var(--bad-line); border-radius:12px; padding:13px 15px; margin-top:14px; }
  .ebanner .t { font-weight:700; font-size:13px; color:var(--bad); font-family:"Plus Jakarta Sans"; }
  .ebanner .raw { font-family:"Spline Sans Mono",monospace; font-size:11px; color:var(--bad-ink); margin-top:6px; white-space:pre-wrap; word-break:break-word; }


  /* freeze pill (sits next to the streak chip — supportive, never punitive) */
  .chip.freeze { background:#EAF1FA; color:#3F6FB0; }

  /* session progress (goal-gradient ring + bar) */
  .goalbar { background:var(--surface); border:1px solid var(--line); border-radius:13px; padding:14px 16px; margin-bottom:14px; box-shadow:0 8px 20px -18px rgba(30,40,70,.3); }
  .goalbar .gb-head { display:flex; align-items:center; gap:12px; }
  .gb-ring { width:46px; height:46px; flex-shrink:0; }
  .gb-ring .gb-ct { font-family:"Spline Sans Mono"; font-size:11px; font-weight:600; fill:var(--ink); }
  .gb-main { flex:1; min-width:0; }
  .gb-title { font-family:"Plus Jakarta Sans"; font-weight:700; font-size:13.5px; }
  .gb-lift { font-size:12px; color:var(--accent); font-weight:600; margin-top:1px; }
  .gb-lift.met { color:var(--pos); }
  .gb-track { height:8px; border-radius:5px; background:var(--surface3); overflow:hidden; margin-top:11px; }
  .gb-track i { display:block; height:100%; border-radius:5px; background:linear-gradient(90deg,var(--accent),var(--accent-2)); transition:width .5s cubic-bezier(.16,1,.3,1); }

  /* daily goal control (SDT autonomy — the user picks the tier) */
  .goalpick { display:flex; align-items:center; gap:8px; margin-top:12px; flex-wrap:wrap; }
  .goalpick .gp-lab { font-size:10.5px; font-weight:700; text-transform:uppercase; letter-spacing:.06em; color:var(--muted); margin-right:2px; }
  .gp-opt { font-family:"Plus Jakarta Sans"; font-weight:700; font-size:12px; padding:6px 12px; border-radius:var(--r-pill); border:1px solid var(--line); background:var(--surface); color:var(--muted); cursor:pointer; }
  .gp-opt:hover { background:var(--surface2); }
  .gp-opt.on { background:var(--accent-soft); border-color:var(--accent-line); color:var(--accent); }
  .gp-hint { font-size:11.5px; color:var(--muted); margin-top:8px; }

  /* macro goal-gradient toward the next rating band */
  .bandbar { display:flex; align-items:center; gap:12px; background:var(--surface); border:1px solid var(--line); border-radius:13px; padding:12px 16px; margin-top:14px; text-decoration:none; color:inherit; }
  .bandbar:hover { background:var(--surface2); }
  .bandbar .bb-main { flex:1; min-width:0; }
  .bandbar .bb-top { font-size:12.5px; } .bandbar .bb-top b { font-family:"Plus Jakarta Sans"; font-weight:700; }
  .bandbar .bb-track { height:6px; border-radius:4px; background:var(--surface3); overflow:hidden; margin-top:8px; }
  .bandbar .bb-track i { display:block; height:100%; border-radius:4px; background:var(--accent); }
  .bandbar .bb-go { color:var(--accent); font-size:12px; font-weight:700; flex-shrink:0; }

  @media (min-width: 880px) {
    .title { font-size:32px; }
  }
</style>
