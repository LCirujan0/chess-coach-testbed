<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>KnightPath — Endgame Recognition</title>
<link rel="icon" type="image/x-icon" href="/favicon.ico">
<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
<link rel="manifest" href="/manifest.json">
<link rel="stylesheet" href="/css/nav.css">
<link rel="stylesheet" href="/css/board.css">
<link rel="stylesheet" href="/css/type.css">
<link rel="stylesheet" href="/css/screen.css">
<link rel="stylesheet" href="/css/session-wrap.css">
<meta name="apple-mobile-web-app-title" content="KnightPath">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;600;700;800&family=Inter:wght@400;500;600;700&family=Spline+Sans+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --accent:#2F9E76; --accent-2:#5FB58F; --accent-soft:#E7F4EE;
    --ink:#1B1D22; --muted:#6E727B;
    --surface:#FFFFFF; --surface2:#F2F4F7; --surface3:#E9ECF1;
    --line:rgba(0,0,0,.10);
    --pos:#1F9D57; --warn:#C98A2E; --bad:#D2553F;
    --r-card:16px; --r-panel:14px; --r-btn:12px; --r-pill:20px;
    --light-sq:#ECE3D2; --dark-sq:#B49A78;
    --hl-move:rgba(47,158,118,.26); --hl-sel:rgba(47,158,118,.36);
    --r-board:9px;
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  html, body {
    background: radial-gradient(120% 60% at 50% -10%, #FFFFFF, #EDF0F3 80%);
    background-attachment:fixed; min-height:100vh;
  }
  body {
    font-family:"Inter",-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif;
    color:var(--ink);
    padding: max(12px, env(safe-area-inset-top)) max(16px, env(safe-area-inset-right)) max(90px, env(safe-area-inset-bottom)) max(16px, env(safe-area-inset-left));
    line-height:1.5; -webkit-font-smoothing:antialiased;
  }
  h1, .title, .stat-num { font-family:"Plus Jakarta Sans","Inter",sans-serif; }
  .container { max-width:480px; margin:0 auto; }

  /* header */
  .header-bar {
    display:flex; align-items:center; gap:10px; margin-bottom:16px;
    position:sticky; top: calc(-1 * max(12px, env(safe-area-inset-top))); z-index:50;
    background:rgba(255,255,255,.75); backdrop-filter:blur(12px); -webkit-backdrop-filter:blur(12px);
    padding: max(12px, env(safe-area-inset-top)) 0 12px; margin-top: calc(-1 * max(12px, env(safe-area-inset-top)));
  }
  .back-btn {
    background:var(--surface); border:1px solid var(--line); border-radius:var(--r-btn);
    padding:7px 13px; cursor:pointer; font-size:14px; font-weight:600; color:var(--ink);
    text-decoration:none; font-family:inherit; line-height:1; display:inline-flex; align-items:center; gap:5px;
    box-shadow:0 1px 2px rgba(0,0,0,.04); transition:background .15s;
  }
  .back-btn:hover { background:var(--surface2); }
  .back-btn.hidden { display:none; }
  .page-title { font-size:17px; font-weight:700; letter-spacing:-.01em; font-family:"Plus Jakarta Sans",sans-serif; }
  .score-pill {
    margin-left:auto; background:var(--surface2); border-radius:var(--r-pill);
    padding:4px 12px; font-size:12px; font-weight:700; color:var(--ink);
    font-family:"Spline Sans Mono",monospace; white-space:nowrap;
  }

  /* board — canonical component (css/board.css + js/board-static.js, §22).
     v0.55a: do NOT cap the wrap here. css/screen.css owns the canonical board
     size (.layout-grid .board-wrap .board: 380px mobile / 640px desktop). The
     old inline max-width:380px on the WRAP clamped the board to ~310-380px on
     desktop, so recognition rendered far smaller than puzzle/endgames. Keep
     only the overlay positioning context. */
  .board-wrap { position:relative; }
  .board-side-label {
    text-align:center; font-size:11px; font-weight:600; color:var(--muted);
    font-family:"Plus Jakarta Sans",sans-serif; margin-bottom:8px;
  }

  /* canonical feedback card — matches puzzle.html .result so the rail reads
     on-brand (was loose bare elements that looked mobile-ish at desktop). */
  .verdict-card {
    padding:16px 18px; border:1px solid var(--line); border-radius:var(--r-card);
    background:var(--surface); box-shadow:0 6px 16px -10px rgba(20,30,55,.16);
  }
  /* prompt + verdict */
  .prompt {
    text-align:center; font-size:15px; font-weight:600; color:var(--ink);
    margin-bottom:14px; font-family:"Plus Jakarta Sans",sans-serif;
  }
  .verdict-btns {
    display:flex; gap:10px; margin-bottom:14px;
  }
  .vbtn {
    flex:1; padding:13px 8px; border-radius:var(--r-btn); border:2px solid var(--line);
    font-size:14px; font-weight:700; font-family:"Plus Jakarta Sans",sans-serif;
    background:var(--surface); color:var(--ink); cursor:pointer;
    transition:border-color .15s, background .15s, transform .1s;
  }
  .vbtn:hover { background:var(--surface2); border-color:var(--accent); }
  .vbtn:active { transform:translateY(1px); }
  .vbtn.win  { border-color:#C9E8D8; background:#F0FAF4; }
  .vbtn.draw { border-color:#D8D8D8; background:#F8F8F8; }
  .vbtn.lose { border-color:#F5D4CE; background:#FDF3F1; }
  .vbtn:disabled { opacity:.45; cursor:default; transform:none; }

  /* result reveal */
  .reveal {
    background:transparent; border:none; border-radius:0; box-shadow:none;
    border-top:1px solid var(--line); padding:12px 0 0; margin-top:12px;
    display:none;
  }
  .reveal.show { display:block; }
  .verdict-badge {
    display:inline-flex; align-items:center; gap:7px; font-size:14px; font-weight:800;
    font-family:"Plus Jakarta Sans",sans-serif; padding:6px 14px;
    border-radius:var(--r-pill); margin-bottom:10px;
  }
  .verdict-badge.correct { background:#E8F5EE; color:var(--pos); }
  .verdict-badge.wrong   { background:#FBF0ED; color:var(--bad); }
  .keyfactor {
    font-size:13px; color:var(--ink); margin-bottom:8px; line-height:1.5;
  }
  .keyfactor strong { font-family:"Plus Jakarta Sans",sans-serif; font-weight:700; }
  .dtz-hint {
    font-size:11.5px; color:var(--muted); font-family:"Spline Sans Mono",monospace;
    margin-bottom:10px;
  }
  .why-area { margin-top:10px; border-top:1px solid var(--line); padding-top:10px; }
  .why-text { font-size:13px; color:var(--ink); line-height:1.6; margin-top:8px; }
  .why-error { font-size:12px; color:var(--bad); margin-top:6px; }

  /* buttons */
  .btn {
    font-family:"Plus Jakarta Sans",sans-serif; font-weight:700; font-size:14px;
    padding:12px 16px; border-radius:var(--r-btn); border:1px solid transparent;
    cursor:pointer; width:100%; transition:filter .15s, transform .1s;
  }
  .btn.primary {
    background:var(--accent); color:#fff;
    box-shadow:0 8px 18px -10px var(--accent);
  }
  .btn.primary:hover { filter:brightness(1.06); }
  .btn.primary:active { transform:translateY(1px); }
  .btn.ghost {
    background:var(--surface); border:1px solid var(--line); color:var(--ink);
  }
  .btn.ghost:hover { background:var(--surface2); }
  .btn.ghost:disabled { opacity:.45; cursor:default; }
  .btn-row { display:flex; gap:10px; }
  .btn-row .btn { flex:1; }

  /* session end */
  .session-end {
    background:var(--surface); border:1px solid var(--line); border-radius:var(--r-card);
    padding:24px 20px; text-align:center;
    box-shadow:0 16px 34px -26px rgba(30,40,70,.4); display:none;
  }
  .session-end.show { display:block; }
  .session-end .big { font-size:40px; font-weight:800; font-family:"Plus Jakarta Sans",sans-serif; margin:8px 0 4px; }
  .session-end .sub { font-size:14px; color:var(--muted); margin-bottom:16px; }
  .weak-card {
    background:var(--accent-soft); border-radius:10px; padding:12px 15px;
    text-align:left; margin-bottom:16px; display:none;
  }
  .weak-card.show { display:block; }
  .weak-card .wt { font-size:12px; font-weight:700; color:var(--accent); margin-bottom:3px; font-family:"Plus Jakarta Sans",sans-serif; }
  .weak-card .ws { font-size:13px; color:var(--ink); }

  /* type breakdown */
  .type-breakdown { margin-bottom:16px; text-align:left; }
  .type-row { display:flex; align-items:center; gap:8px; padding:5px 0; border-bottom:1px solid var(--line); }
  .type-row:last-child { border-bottom:none; }
  .type-name { font-size:12px; font-family:"Spline Sans Mono",monospace; flex:1; }
  .type-pct { font-size:12px; font-weight:700; font-family:"Plus Jakarta Sans",sans-serif; min-width:40px; text-align:right; }
  .type-bar-wrap { flex:1; height:4px; background:var(--surface3); border-radius:2px; overflow:hidden; }
  .type-bar { height:100%; background:var(--accent); border-radius:2px; transition:width .4s ease; }

  /* loading */
  .loading-state {
    text-align:center; padding:48px 20px; color:var(--muted); font-size:14px;
  }
  .error-state {
    background:#FBF0ED; border:1px solid #EDD2CB; border-radius:12px;
    padding:16px; color:var(--bad); font-size:13px;
  }

  /* progress bar */
  .progress-wrap { height:3px; background:var(--surface3); border-radius:2px; margin-bottom:14px; overflow:hidden; }
  .progress-bar { height:100%; background:var(--accent); border-radius:2px; transition:width .3s ease; }
  /* nav chrome (v0.42 model) */
  .nav-drawer { position:fixed; top:0; left:0; width:288px; max-width:84vw; height:100vh; background:var(--surface); border-right:1px solid var(--line); transform:translateX(-100%); transition:transform 200ms ease; z-index:100; padding:20px 14px; overflow-y:auto; display:flex; flex-direction:column; gap:4px; box-shadow:0 20px 40px -22px rgba(20,30,55,.25); }
  .nav-drawer.open { transform:translateX(0); }
  .nav-brand { display:flex; align-items:center; gap:10px; padding:6px 8px 14px; margin-bottom:6px; border-bottom:1px solid var(--line); }
  .nav-brand-mark { width:30px; height:30px; object-fit:contain; flex-shrink:0; }
  .nav-brand-name { font-weight:700; font-size:15px; font-family:"Plus Jakarta Sans","Inter",sans-serif; }
  .nav-drawer-link { display:flex; align-items:center; gap:11px; padding:10px 12px; border-radius:10px; font-size:14px; font-weight:600; color:var(--ink); text-decoration:none; transition:background-color .15s ease, box-shadow .15s ease; }
  .nav-drawer-link:hover { background:var(--surface2); }
  .nav-drawer-link.active { background:var(--accent); color:#fff; box-shadow:0 6px 14px -8px var(--accent); }
  .nav-drawer-link .nav-icon { width:18px; height:18px; flex-shrink:0; display:inline-flex; align-items:center; justify-content:center; }
  .nav-drawer-link svg.nav-icon { stroke:currentColor; fill:none; }
  .nav-drawer-link svg.nav-icon .filldot { fill:currentColor; stroke:none; }
  .nav-drawer-link.coming { color:var(--muted); }
  .nav-drawer-link.secondary { font-size:13px; padding:7px 12px; color:var(--muted); }
  .nav-drawer-link.secondary:hover { background:var(--surface2); }
  .nav-drawer-link.secondary.active { background:none; color:var(--accent); box-shadow:none; font-weight:700; }
  .nav-separator { border:none; border-top:1px solid var(--line); margin:8px 0; }
  .version-stamp { margin-top:auto; padding:10px 12px 4px; font-size:10px; color:var(--muted); font-family:"Spline Sans Mono",ui-monospace,monospace; letter-spacing:.02em; border-top:1px solid var(--line); }
  .nav-backdrop { position:fixed; inset:0; background:rgba(15,20,30,.45); z-index:99; opacity:0; pointer-events:none; transition:opacity 200ms ease; }
  .nav-backdrop.open { opacity:1; pointer-events:auto; }
  .tab-bar { position:fixed; bottom:0; left:0; right:0; display:flex; background:var(--surface); border-top:1px solid var(--line); z-index:90; padding:6px 6px max(env(safe-area-inset-bottom,6px),6px); box-shadow:0 -8px 22px -16px rgba(15,20,40,.16); }
  .tab-bar a { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:2px; padding:7px 4px; border-radius:10px; font-size:10px; font-weight:600; color:var(--muted); text-decoration:none; transition:color .15s ease; }
  .tab-bar a.active { color:var(--accent); }
  .tab-bar a .tab-icon { width:22px; height:22px; }
  .tab-bar a svg.tab-icon { stroke:currentColor; fill:none; }
  .tab-bar a svg.tab-icon .filldot { fill:currentColor; stroke:none; }
  @media (min-width: 880px) {
    body { padding-left:248px; padding-right:28px; padding-bottom:28px; font-size:15px; }
    .container { max-width:1100px; margin-left:0; margin-right:auto; }
    .tab-bar { display:none; }
    .nav-drawer { position:fixed !important; top:0; left:0; width:224px !important; max-width:224px !important; height:100vh; transform:none !important; border-right:1px solid var(--line); background:var(--surface); padding:22px 14px 18px; z-index:10; }
    .nav-backdrop { display:none !important; }
  }
  /* v0.55 - #drill-root is transparent so its JS-built .lg-left/.lg-right
     columns become children of the shared .layout-grid (css/screen.css).
     The full-screen states (results/error/loading) are single children
     that fill column 1. */
  #drill-root { display: contents; }
</style>
</head>
<body>
<div class="container">
  <div id="recog-head" class="header-bar">
    <!-- US-4: the "Today" back chip belongs to the Today session wrapper, not
         direct access. Hidden by default; shown only when renderSessionWrap()
         reports an active Today block (see boot). -->
    <a href="/today.html" class="back-btn hidden" id="recog-back">← Today</a>
    <span class="page-title">Endgame recognition</span>
    <div class="score-pill" id="score-pill">0 / 0</div>
  </div>

  <!-- Canonical training screen (css/screen.css, v0.55): board left, rail right.
       The session wrapper shows only inside a Today session (US-4). -->
  <div class="layout-grid">
    <div class="session-wrap hidden" id="session-wrap"></div>
    <div id="drill-root">
      <div class="loading-state">Loading positions…</div>
    </div>
  </div>
</div>

<script type="module">
import { renderStaticBoard } from '/js/board-static.js';
import { renderSessionWrap } from '/js/session-wrap.js';
/* ===========================================================================
 * endgame-recognition.html — Spec 08 drill
 * v0.28 · Releases-B · 2026-06-01
 *
 * Static board (FEN only) — no engine, no Stockfish.
 * User picks Winning / Drawn / Losing.
 * Reveals verdict + keyFactor + dtz cue.
 * Optional "Why?" button fires one LLM call (never automatic).
 * Stores per-type accuracy in chess-coach-recognition-v1.
 * =========================================================================*/
(function () {
  'use strict';

  var KEY_RECOG = 'chess-coach-recognition-v1';
  var SESSION_SIZE = 20; // 10 wins + 10 draws, balanced
  var root = document.getElementById('drill-root');
  var scorePill = document.getElementById('score-pill');

  // ---- localStorage helpers -----------------------------------------------
  function loadJson(key, fb) {
    try { var r = localStorage.getItem(key); if (r == null) return fb; var v = JSON.parse(r); return v == null ? fb : v; } catch (e) { return fb; }
  }
  function saveJson(key, val) {
    try { localStorage.setItem(key, JSON.stringify(val)); } catch (e) {}
  }
  function esc(s) {
    return String(s == null ? '' : s).replace(/[&<>"]/g, function (c) {
      return ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' })[c];
    });
  }

  // ---- session state -------------------------------------------------------
  var allPositions = null;       // loaded from JSON {positions:[...]}
  var sessionPositions = [];     // balanced sample for this session
  var sessionIdx = 0;            // index into sessionPositions
  var sessionCorrect = 0;
  var sessionTotal = 0;
  var byTypeSession = {};        // { type: { correct, total } }
  var whyCache = {};             // fen → explanation string
  var currentRevealed = false;

  // ---- board markup stub (rendered by js/board-static.js, §22) -------------
  // Returns the side-to-move label + an empty canonical .board; the position is
  // painted by renderStaticBoard() right after this string is in the DOM. The
  // old bespoke unicode-glyph renderer + .sq markup are deleted (§22-A).
  function renderBoard(pos) {
    var sideStr = pos.side === 'w' ? 'White' : 'Black';
    return '<div class="board-side-label">Side to move: <b>' + esc(sideStr) + '</b></div>' +
      '<div class="board-wrap">' +
        '<div class="board" id="recog-board"></div>' +
      '</div>';
  }

  // ---- Balanced session sampler -------------------------------------------
  function buildSession(positions) {
    // Split by result
    var wins = positions.filter(function (p) { return p.result === 'win'; });
    var draws = positions.filter(function (p) { return p.result === 'draw'; });
    // Shuffle each
    function shuffle(arr) {
      var a = arr.slice();
      for (var i = a.length - 1; i > 0; i--) {
        var j = Math.floor(Math.random() * (i + 1));
        var tmp = a[i]; a[i] = a[j]; a[j] = tmp;
      }
      return a;
    }
    var half = Math.floor(SESSION_SIZE / 2);
    var winSample = shuffle(wins).slice(0, half);
    var drawSample = shuffle(draws).slice(0, half);
    // Avoid previously seen FENs this session (use recent from localStorage)
    var storage = loadJson(KEY_RECOG, {});
    var seenFens = (storage.seenFens || []).slice(-200);
    function notSeen(p) { return seenFens.indexOf(p.fen) === -1; }
    winSample = winSample.filter(notSeen);
    drawSample = drawSample.filter(notSeen);
    // Top up if needed
    if (winSample.length < half) winSample = shuffle(wins).slice(0, half);
    if (drawSample.length < half) drawSample = shuffle(draws).slice(0, half);
    return shuffle(winSample.concat(drawSample));
  }

  // ---- Score helpers -------------------------------------------------------
  function updateScorePill() {
    if (scorePill) scorePill.textContent = sessionCorrect + ' / ' + sessionTotal;
  }

  function recordResult(pos, correct) {
    sessionTotal++;
    if (correct) sessionCorrect++;
    // Update session by-type
    if (!byTypeSession[pos.type]) byTypeSession[pos.type] = { correct: 0, total: 0 };
    byTypeSession[pos.type].total++;
    if (correct) byTypeSession[pos.type].correct++;
    // Persist to localStorage
    var storage = loadJson(KEY_RECOG, { byType: {}, recent: [], seenFens: [] });
    if (!storage.byType) storage.byType = {};
    if (!storage.recent) storage.recent = [];
    if (!storage.seenFens) storage.seenFens = [];
    if (!storage.byType[pos.type]) storage.byType[pos.type] = { seen: 0, correct: 0 };
    storage.byType[pos.type].seen++;
    if (correct) storage.byType[pos.type].correct++;
    storage.recent.push({ id: pos.fen, guess: correct, at: new Date().toISOString() });
    if (storage.recent.length > 50) storage.recent = storage.recent.slice(-50);
    storage.seenFens.push(pos.fen);
    if (storage.seenFens.length > 500) storage.seenFens = storage.seenFens.slice(-500);
    saveJson(KEY_RECOG, storage);
    updateScorePill();
  }

  // ---- DTZ hint ------------------------------------------------------------
  function dtzHint(pos) {
    var dtz = pos.dtz;
    if (dtz == null) return '';
    if (pos.result === 'draw') {
      if (dtz === 0) return 'Exact theoretical draw — neither side can make progress.';
      return '';
    }
    // win
    if (dtz <= 3) return 'Fastest mate: just ' + dtz + ' move' + (dtz === 1 ? '' : 's') + ' to conversion.';
    if (dtz <= 10) return 'Clean win — converted in ' + dtz + ' moves with best play.';
    if (dtz <= 30) return 'Winning, but technique required (' + dtz + ' moves to conversion).';
    return 'Won, though the win requires accurate technique (' + dtz + ' moves to conversion).';
  }

  // ---- Why? LLM call -------------------------------------------------------
  function fetchWhy(pos, callback) {
    if (whyCache[pos.fen]) { callback(null, whyCache[pos.fen]); return; }
    var sideStr = pos.side === 'w' ? 'White' : 'Black';
    var verdictStr = pos.result === 'win' ? 'winning for ' + sideStr : 'a theoretical draw';
    var systemPrompt =
      'You are a chess endgame coach. This position is ' + verdictStr +
      ' — this is verified tablebase truth. Explain concisely in 2–3 sentences WHY it is ' +
      verdictStr + ' for the side to move. The key factor is: "' + pos.keyFactor +
      '". Ground your explanation in the specific position — king placement, pawn structure,' +
      ' piece activity. Do not introduce any uncertainty about the verdict; it is established.';
    var userMsg = 'FEN: ' + pos.fen + '\nSide to move: ' + sideStr +
      '\nVerdict: ' + verdictStr + '\nKey factor: ' + pos.keyFactor + '\n\nExplain why.';
    fetch('/api/coach', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-haiku-4-5-20251001',
        max_tokens: 220,
        system: systemPrompt,
        messages: [{ role: 'user', content: userMsg }]
      })
    })
    .then(function (r) { return r.json(); })
    .then(function (data) {
      var text = data && data.content && data.content[0] && data.content[0].text;
      if (text) {
        whyCache[pos.fen] = text;
        callback(null, text);
      } else {
        callback('No explanation returned.', null);
      }
    })
    .catch(function (err) { callback(String(err), null); });
  }

  // ---- Render: position view -----------------------------------------------
  function renderPosition(pos) {
    var sideStr = pos.side === 'w' ? 'White' : 'Black';
    var progressPct = Math.round((sessionTotal / SESSION_SIZE) * 100);
    // v0.55 US-4: canonical training screen — board in .lg-left, prompt +
    // verdict + reveal in the .lg-right rail (matches puzzle/endgames).
    root.innerHTML =
      '<div class="lg-left">' +
        '<div class="progress-wrap"><div class="progress-bar" style="width:' + progressPct + '%"></div></div>' +
        renderBoard(pos) +
      '</div>' +
      '<div class="lg-right">' +
        '<div class="verdict-card" id="verdict-card">' +
          '<p class="prompt">Is this <b>winning or drawn</b> for ' + esc(sideStr) + ' to move?</p>' +
          '<div class="verdict-btns">' +
            '<button class="vbtn win" id="btn-winning">Winning</button>' +
            '<button class="vbtn draw" id="btn-drawn">Drawn</button>' +
            '<button class="vbtn lose" id="btn-losing">Losing</button>' +
          '</div>' +
          '<div class="reveal" id="reveal-panel"></div>' +
          '<div id="next-area"></div>' +
        '</div>' +
      '</div>';

    renderStaticBoard(document.getElementById('recog-board'), pos.fen, { orientation: pos.side });

    currentRevealed = false;

    var bWin  = document.getElementById('btn-winning');
    var bDraw = document.getElementById('btn-drawn');
    var bLose = document.getElementById('btn-losing');

    function onPick(userVerdict) {
      if (currentRevealed) return;
      currentRevealed = true;
      bWin.disabled = true; bDraw.disabled = true; bLose.disabled = true;
      // Highlight chosen button
      var chosen;
      if (userVerdict === 'win') { chosen = bWin; bWin.style.borderColor = '#2F9E76'; }
      else if (userVerdict === 'draw') { chosen = bDraw; bDraw.style.borderColor = '#888'; }
      else { chosen = bLose; bLose.style.borderColor = '#D2553F'; }
      var correct = (userVerdict === pos.result);
      recordResult(pos, correct);
      showReveal(pos, correct, userVerdict);
    }

    bWin.addEventListener('click', function () { onPick('win'); });
    bDraw.addEventListener('click', function () { onPick('draw'); });
    bLose.addEventListener('click', function () { onPick('lose'); });
  }

  function showReveal(pos, correct, userVerdict) {
    var panel = document.getElementById('reveal-panel');
    var nextArea = document.getElementById('next-area');
    var verdictLabel = pos.result === 'win' ? 'Winning' : 'Drawn';
    var dtz = dtzHint(pos);
    var badgeClass = correct ? 'correct' : 'wrong';
    var badgeText = correct ? '✓ Correct — ' + verdictLabel : '✗ Wrong — it\'s ' + verdictLabel;

    panel.innerHTML =
      '<div class="verdict-badge ' + badgeClass + '">' + badgeText + '</div>' +
      '<div class="keyfactor"><strong>' + esc(pos.type) + ':</strong> ' + esc(pos.keyFactor) + '</div>' +
      (dtz ? '<div class="dtz-hint">' + esc(dtz) + '</div>' : '') +
      '<div class="why-area">' +
        '<button class="btn ghost" id="why-btn" style="width:auto;padding:7px 16px;font-size:13px;">Why this position?</button>' +
        '<div id="why-out"></div>' +
      '</div>';
    panel.classList.add('show');

    var whyBtn = document.getElementById('why-btn');
    var whyOut = document.getElementById('why-out');
    whyBtn.addEventListener('click', function () {
      if (whyBtn.disabled) return;
      whyBtn.disabled = true;
      whyBtn.textContent = 'Asking coach…';
      fetchWhy(pos, function (err, text) {
        whyBtn.style.display = 'none';
        if (err || !text) {
          whyOut.innerHTML = '<div class="why-error">Coach unavailable — check your connection.</div>';
        } else {
          whyOut.innerHTML = '<div class="why-text">' + esc(text) + '</div>';
        }
      });
    });

    // Render next/end button
    var isLast = sessionIdx >= sessionPositions.length - 1;
    if (isLast) {
      nextArea.innerHTML = '<button class="btn primary" id="next-btn" style="margin-top:8px;">See results</button>';
    } else {
      nextArea.innerHTML = '<button class="btn primary" id="next-btn" style="margin-top:8px;">Next position →</button>';
    }
    document.getElementById('next-btn').addEventListener('click', function () {
      if (isLast) {
        showSessionEnd();
      } else {
        sessionIdx++;
        renderPosition(sessionPositions[sessionIdx]);
      }
    });
  }

  // ---- Session end ---------------------------------------------------------
  function showSessionEnd() {
    var pct = sessionTotal > 0 ? Math.round((sessionCorrect / sessionTotal) * 100) : 0;
    // Find weakest type this session
    var weakestType = null, weakestPct = 101;
    for (var t in byTypeSession) {
      var s = byTypeSession[t];
      if (s.total >= 2) {
        var tp = s.correct / s.total;
        if (tp < weakestPct) { weakestPct = tp; weakestType = t; }
      }
    }
    // Also check lifetime localStorage for weakest type
    var storage = loadJson(KEY_RECOG, { byType: {} });
    var lifeWeakType = null, lifeWeakPct = 101;
    for (var lt in (storage.byType || {})) {
      var ls = storage.byType[lt];
      if (ls.seen >= 5) {
        var lp = ls.correct / ls.seen;
        if (lp < lifeWeakPct) { lifeWeakPct = lp; lifeWeakType = lt; }
      }
    }

    // Type breakdown for this session
    var typeRows = Object.keys(byTypeSession).sort(function (a, b) {
      var pa = byTypeSession[a].correct / byTypeSession[a].total;
      var pb = byTypeSession[b].correct / byTypeSession[b].total;
      return pa - pb;
    }).map(function (t) {
      var s = byTypeSession[t];
      var tp = Math.round((s.correct / s.total) * 100);
      var barW = tp;
      return '<div class="type-row">' +
        '<span class="type-name">' + esc(t) + '</span>' +
        '<div class="type-bar-wrap"><div class="type-bar" style="width:' + barW + '%"></div></div>' +
        '<span class="type-pct">' + tp + '%</span>' +
      '</div>';
    }).join('');

    var weakHtml = '';
    var showWeakType = weakestType || lifeWeakType;
    var showWeakPctVal = weakestType ? Math.round(weakestPct * 100) : (lifeWeakType ? Math.round(lifeWeakPct * 100) : 0);
    if (showWeakType) {
      weakHtml = '<div class="weak-card show">' +
        '<div class="wt">Weakest family</div>' +
        '<div class="ws">' + esc(showWeakType) + ' — ' + showWeakPctVal + '% correct. Drill this type to build the pattern.</div>' +
      '</div>';
    }

    root.innerHTML =
      '<div class="session-end show">' +
        '<div style="font-size:32px;">🏁</div>' +
        '<div class="big">' + sessionCorrect + '/' + sessionTotal + '</div>' +
        '<div class="sub">' + pct + '% correct this session</div>' +
        weakHtml +
        (typeRows ? '<div class="type-breakdown">' + typeRows + '</div>' : '') +
        '<div class="btn-row">' +
          '<a href="/endgame-recognition.html" class="btn primary" style="text-align:center;text-decoration:none;">New session</a>' +
          '<a href="/today.html" class="btn ghost" style="text-align:center;text-decoration:none;">Back to today</a>' +
        '</div>' +
      '</div>';
  }

  // ---- Boot ----------------------------------------------------------------
  function boot() {
    // v0.55 US-4: persistent in-session wrapper (hidden unless deep-linked into
    // a Today session); recognition shows the plain canonical screen otherwise.
    var inTodaySession = renderSessionWrap(document.getElementById("session-wrap"), { exitHref: "/session.html" });
    // US-4: the header "Today" back chip is part of the Today session chrome.
    // Show it only inside an active Today session; on direct access it stays
    // hidden so the surface reads as a plain canonical screen.
    var backChip = document.getElementById("recog-back");
    if (backChip) backChip.classList.toggle("hidden", !inTodaySession);
    fetch('/data/endgame-recognition.json')
      .then(function (r) {
        if (!r.ok) throw new Error('HTTP ' + r.status);
        return r.json();
      })
      .then(function (data) {
        allPositions = data.positions || data;
        if (!Array.isArray(allPositions) || allPositions.length === 0) {
          throw new Error('No positions found in dataset.');
        }
        sessionPositions = buildSession(allPositions);
        updateScorePill();
        renderPosition(sessionPositions[0]);
      })
      .catch(function (err) {
        root.innerHTML = '<div class="error-state"><b>Could not load positions.</b><br>' + esc(String(err)) + '</div>';
      });
  }

  boot();
})();
</script>
