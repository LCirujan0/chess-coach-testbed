<style>
  :root {
    --accent:#2F9E76; --accent-2:#5FB58F; --accent-soft:#E7F4EE;
    --ink:#1B1D22; --muted:#6E727B;
    --surface:#FFFFFF; --surface2:#F2F4F7; --surface3:#E9ECF1;
    --line:rgba(0,0,0,.10);
    --pos:#1F9D57; --warn:#C98A2E; --bad:#D2553F;
    --r-card:16px; --r-panel:14px; --r-btn:12px; --r-pill:20px;
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  html, body {
    background: radial-gradient(120% 60% at 50% -10%, #FFFFFF, #EDF0F3 80%);
    background-attachment: fixed;
    min-height: 100vh;
  }
  body {
    font-family:"Inter",-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif;
    color:var(--ink);
    padding: max(12px, env(safe-area-inset-top)) max(16px, env(safe-area-inset-right)) max(90px, env(safe-area-inset-bottom)) max(16px, env(safe-area-inset-left));
    line-height:1.5;
    -webkit-font-smoothing:antialiased;
  }
  .container { max-width: 720px; margin: 0 auto; }

  h1, .title, .page-title, .nav-brand-name {
    font-family:"Plus Jakarta Sans","Inter",sans-serif;
  }
  .mono, .src, .accuracy-readout {
    font-family:"Spline Sans Mono",ui-monospace,monospace;
  }

  /* Header */
    .header-bar { display:flex; align-items:center; gap:12px; margin-bottom:14px; position: sticky; top: calc(-1 * max(12px, env(safe-area-inset-top))); z-index: 50; background: rgba(255,255,255,0.75); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); padding: max(12px, env(safe-area-inset-top)) 0 12px 0; margin-top: calc(-1 * max(12px, env(safe-area-inset-top))); }
  .hamburger {
    background:var(--surface); border:1px solid var(--line);
    border-radius:var(--r-btn); padding:8px 12px; cursor:pointer;
    font-size:16px; line-height:1; color:var(--ink);
    box-shadow:0 1px 2px rgba(0,0,0,.04); transition:background .15s ease;
    font-family:inherit;
  }
  .hamburger:hover { background:var(--surface2); }
  .page-title { font-size:18px; font-weight:700; letter-spacing:-.01em; }

  /* Summary bar = stat card */
  .summary-bar {
    padding:14px 16px; background:var(--surface);
    border:1px solid var(--line); border-radius:var(--r-card);
    margin-bottom:14px; font-size:13px; color:var(--muted);
    line-height:1.5;
    box-shadow:0 6px 16px -10px rgba(20,30,55,.18);
  }
  .summary-bar strong {
    color:var(--ink); font-size:18px; font-weight:700;
    font-family:"Plus Jakarta Sans","Inter",sans-serif;
    letter-spacing:-.01em;
  }

  /* Filter tabs (segmented control) */
  .filter-tabs, .cat-tabs {
    display:inline-flex; padding:3px; gap:2px;
    background:var(--surface2); border-radius:11px;
    width:100%; margin-bottom:8px;
  }
  .cat-tabs { margin-bottom:14px; }
  .filter-tab, .cat-tab {
    flex:1; border:none; background:transparent;
    cursor:pointer; color:var(--muted);
    font:inherit; font-size:11px; font-weight:600;
    padding:7px 10px; border-radius:8px;
    transition: transform 0.15s cubic-bezier(0.34, 1.56, 0.64, 1), background-color 0.15s ease, box-shadow 0.15s ease, filter 0.15s ease; white-space:nowrap;
    text-align:center;
  }
  .filter-tab.active {
    background:var(--surface); color:var(--ink);
    box-shadow:0 1px 3px rgba(0,0,0,.13);
  }
  .cat-tab.active {
    background:var(--accent); color:#fff;
    box-shadow:0 2px 6px -2px var(--accent);
  }
  .filter-tab.empty, .cat-tab.empty { opacity:.45; cursor:not-allowed; }
  .filter-tab .count, .cat-tab .count {
    display:inline-block; background:rgba(0,0,0,.1);
    border-radius:8px; padding:1px 6px; margin-left:4px;
    font-family:"Spline Sans Mono",monospace; font-size:10px;
    font-weight:500;
  }
  .filter-tab.active .count { background:var(--surface2); }
  .cat-tab.active .count { background:rgba(255,255,255,.22); color:#fff; }

  /* Item card (solved puzzle row) */
  .empty-state {
    padding:30px 24px; background:var(--surface);
    border:1px solid var(--line); border-radius:var(--r-card);
    text-align:center; color:var(--muted);
    font-size:14px; line-height:1.5;
    box-shadow:0 6px 16px -10px rgba(20,30,55,.16);
  }
  .item {
    background:var(--surface); border:1px solid var(--line);
    border-radius:var(--r-card); padding:14px 16px;
    margin-bottom:10px; display:flex; align-items:center; gap:14px;
    text-decoration:none; color:var(--ink); cursor:pointer;
    transition: transform 0.15s cubic-bezier(0.34, 1.56, 0.64, 1), background-color 0.15s ease, box-shadow 0.15s ease, filter 0.15s ease;
    box-shadow:0 6px 16px -12px rgba(20,30,55,.16);
  }
  .item:hover {
    border-color:color-mix(in srgb, var(--accent) 35%, var(--line));
    box-shadow:0 12px 24px -14px rgba(20,30,55,.22);
    transform:translateY(-1px);
  }
  @supports not (background: color-mix(in srgb, red 50%, transparent)) {
    .item:hover { border-color: rgba(47,158,118,.35); }
  }
  .item .stars {
    font-size:16px; color:var(--accent);
    letter-spacing:-1px; flex-shrink:0; width:80px;
    line-height:1.2;
  }
  .item .stars .empty { color:var(--surface3); }
  .accuracy-readout {
    font-size:10px; color:var(--muted);
    margin-top:3px; letter-spacing:.02em;
  }
  .item .meta { flex:1; min-width:0; }
  .item .src {
    font-size:11px; color:var(--muted);
    overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
  }
  .item .moves {
    font-size:13px; color:var(--ink); margin-top:3px;
    font-weight:500;
  }
  .item .tags {
    display:flex; gap:5px; margin-top:6px; flex-wrap:wrap;
  }
  .tag {
    font-size:9px; font-weight:700;
    letter-spacing:.06em; text-transform:uppercase;
    padding:2px 8px; border-radius:var(--r-pill);
    background:var(--surface2); color:var(--muted);

  .tag.cat { background:var(--accent-soft); color:var(--accent); }
  .tag.sev-inaccuracy { background:#FBF5EA; color:var(--warn); }
  .tag.sev-mistake { background:#FBF0ED; color:var(--bad); }
  .tag.sev-blunder { background:var(--bad); color:#fff; }

  /* Nav (spec §7) */
  .nav-drawer {
    position:fixed; top:0; left:0;
    width:288px; max-width:84vw; height:100vh;
    background:var(--surface); border-right:1px solid var(--line);

  .nav-drawer-link svg.nav-icon { stroke:currentColor; fill:none; }
  .nav-drawer-link svg.nav-icon .filldot { fill:currentColor; stroke:none; }
  .tab-bar a svg.tab-icon { stroke:currentColor; fill:none; }
  .tab-bar a svg.tab-icon .filldot { fill:currentColor; stroke:none; }
  .nav-drawer-link.coming { color:var(--muted); }
  .nav-drawer-link.coming .nav-soon {
    margin-left:auto; font-size:9px; font-weight:700;
    letter-spacing:.08em; text-transform:uppercase;
    background:var(--surface2); color:var(--muted);

  .version-stamp {

  .nav-backdrop {
    position:fixed; inset:0; background:rgba(15,20,30,.45);

  }
  .nav-backdrop.open { opacity:1; pointer-events:auto; }

  .tab-bar {
    position:fixed; bottom:0; left:0; right:0;
    display:flex; background:var(--surface);
    border-top:1px solid var(--line);
    z-index:90;
    padding:6px 6px max(env(safe-area-inset-bottom, 6px), 6px);

  .tab-bar a {
    flex:1; display:flex; flex-direction:column;

  .hidden { display:none !important; }

  @media (min-width: 880px) {
    body {
      padding-left:248px; padding-right:28px;

    }

    .nav-drawer {
      position:fixed !important;
      top:0; left:0;
      width:224px !important; max-width:224px !important;
      height:100vh;
      transform:none !important;

      background:var(--surface);
      padding:22px 14px 18px;
      z-index:10;
    }
    .nav-backdrop { display:none !important; }
  }
</style>

<script type="module">
const STORAGE_KEY_MISTAKES = 'chess-coach-mistakes-v1';
const STORAGE_KEY_ATTEMPTS = 'chess-coach-attempts-v1';

// ---------- Nav drawer ----------
const drawer = document.getElementById('nav-drawer');
const backdrop = document.getElementById('nav-backdrop');
document.getElementById('hamburger-btn').addEventListener('click', () => {
  drawer.classList.add('open');
  backdrop.classList.add('open');
});
backdrop.addEventListener('click', () => {
  drawer.classList.remove('open');
  backdrop.classList.remove('open');
});

// ---------- State ----------
const state = {
  mistakes: [],
  attempts: {},
  severityFilter: 'all',
  categoryFilter: 'all',
};

function loadJson(key, fallback) {
  try { const v = JSON.parse(localStorage.getItem(key) || ''); return v ?? fallback; }
  catch { return fallback; }
}

state.mistakes = loadJson(STORAGE_KEY_MISTAKES, []) || [];
state.attempts = loadJson(STORAGE_KEY_ATTEMPTS, {}) || {};

// ---------- Star computation ----------
function starsFor(attempt) {
  if (!attempt || !attempt.solved) return 0;
  const hintUsed = !!attempt.hintUsed;
  let stars;
  // Prefer the accuracy score (new multi-move scoring system).
  if (typeof attempt.firstAccuracy === 'number') {
    const a = attempt.firstAccuracy;
    if (a >= 95) stars = 5;
    else if (a >= 85) stars = 4;
    else if (a >= 70) stars = 3;
    else if (a >= 50) stars = 2;
    else stars = 1;
  } else {
    // Fallback for older attempts without accuracy: legacy tier+tries logic.
    const tries = attempt.attempts || 1;
    const firstGrade = attempt.firstGrade || attempt.lastGrade || 'good';
    if (tries === 1 && firstGrade === 'best') stars = 5;
    else if (tries === 1 && firstGrade === 'good') stars = 4;
    else if (tries === 2) stars = 3;
    else if (tries === 3) stars = 2;
    else stars = 1;
  }
  if (hintUsed) stars = Math.max(1, stars - 1);
  return stars;
}

function renderStars(n) {
  const filled = '★'.repeat(n);
  const empty = '<span class="empty">' + '★'.repeat(5 - n) + '</span>';
  return filled + empty;
}

// ---------- Filtering ----------
function solvedPuzzles() {
  return state.mistakes.filter((p) => state.attempts[p.id]?.solved);
}
function filtered() {
  let arr = solvedPuzzles();
  if (state.severityFilter !== 'all') arr = arr.filter((p) => p.severity === state.severityFilter);
  if (state.categoryFilter !== 'all') arr = arr.filter((p) => p.category === state.categoryFilter);
  return arr;
}

// ---------- Render ----------
function renderSummary() {
  const solved = solvedPuzzles();
  const totals = solved.length;
  const totalMistakes = state.mistakes.length;
  const fiveStar = solved.filter((p) => starsFor(state.attempts[p.id]) === 5).length;
  document.getElementById('summary-bar').innerHTML =
    `<strong>${totals} solved</strong> out of ${totalMistakes} ingested. ${fiveStar} solved cleanly on the first try.`;
}

function renderCounts() {
  const solved = solvedPuzzles();
  const sev = { all: solved.length, inaccuracy: 0, mistake: 0, blunder: 0 };
  const cat = { all: solved.length, opening: 0, middlegame: 0, endgame: 0 };
  for (const p of solved) {
    if (sev[p.severity] !== undefined) sev[p.severity]++;
    if (cat[p.category] !== undefined) cat[p.category]++;
  }
  document.getElementById('count-all').textContent = sev.all;
  document.getElementById('count-inaccuracy').textContent = sev.inaccuracy;
  document.getElementById('count-mistake').textContent = sev.mistake;
  document.getElementById('count-blunder').textContent = sev.blunder;
  document.getElementById('cat-all').textContent = cat.all;
  document.getElementById('cat-opening').textContent = cat.opening;
  document.getElementById('cat-middlegame').textContent = cat.middlegame;
  document.getElementById('cat-endgame').textContent = cat.endgame;

  for (const t of document.querySelectorAll('.filter-tab')) {
    const s = t.dataset.sev;
    t.classList.toggle('active', s === state.severityFilter);
    t.classList.toggle('empty', sev[s] === 0 && s !== 'all');
  }
  for (const t of document.querySelectorAll('.cat-tab')) {
    const c = t.dataset.cat;
    t.classList.toggle('active', c === state.categoryFilter);
    t.classList.toggle('empty', cat[c] === 0 && c !== 'all');
  }
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, (c) =>
    ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
}

function renderList() {
  const list = document.getElementById('list');
  const items = filtered();
  list.innerHTML = '';
  if (!items.length) {
    list.innerHTML = '<div class="empty-state">Nothing here yet. Solve a puzzle on the Puzzles tab to see it appear with a score.</div>';
    return;
  }
  for (const p of items) {
    const a = state.attempts[p.id];
    const stars = starsFor(a);
    const accLabel = (typeof a?.firstAccuracy === 'number') ? `${a.firstAccuracy}%` : '';
    const div = document.createElement('a');
    div.className = 'item';
    div.href = `/puzzle.html?id=${encodeURIComponent(p.id)}&mode=review`;
    div.innerHTML = `
      <div class="stars">${renderStars(stars)}${accLabel ? `<div style="font-family:ui-monospace,monospace; font-size:10px; color:var(--muted); margin-top:2px;">${escapeHtml(accLabel)}</div>` : ''}</div>
      <div class="meta">
        <div class="src">${escapeHtml(p.source || p.id)}</div>
        <div class="moves">you: ${escapeHtml(p.userMoveSan || '?')} → engine: ${escapeHtml(p.bestMoveSan || '?')} (${p.cpLoss}cp)</div>
        <div class="tags">
          <span class="tag cat">${escapeHtml(p.category)}</span>
          <span class="tag sev-${escapeHtml(p.severity)}">${escapeHtml(p.severity)}</span>
        </div>
      </div>
    `;
    list.appendChild(div);
  }
}

function rerender() {
  renderSummary();
  renderCounts();
  renderList();
}

document.getElementById('filter-tabs').addEventListener('click', (e) => {
  const tab = e.target.closest('.filter-tab');
  if (!tab) return;
  state.severityFilter = tab.dataset.sev;
  rerender();
});
document.getElementById('cat-tabs').addEventListener('click', (e) => {
  const tab = e.target.closest('.cat-tab');
  if (!tab) return;
  state.categoryFilter = tab.dataset.cat;
  rerender();
});

rerender();
</script>
</body>
</html>
