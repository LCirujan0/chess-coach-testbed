<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>KnightPath. Session</title>
<link rel="icon" type="image/x-icon" href="/favicon.ico">
<link rel="manifest" href="/manifest.json">
<meta name="apple-mobile-web-app-title" content="KnightPath">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="/css/tokens.css">
<link rel="stylesheet" href="/css/type.css">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing:border-box; margin:0; padding:0; }
  html, body {
    background: radial-gradient(120% 60% at 50% -10%, var(--app-bg-start), var(--app-bg-end) 80%);
    background-attachment: fixed; min-height:100vh;
  }
  body { font-family:"Inter",-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif; color:var(--ink); line-height:1.5; -webkit-font-smoothing:antialiased; }
  h1,h2,h3,.title,.stat .v { font-family:"Plus Jakarta Sans","Inter",sans-serif; }

  /* focus header + segmented progress rail (one segment per block, a pip per item) */
  .focus-top { display:flex; align-items:center; gap:14px; padding:11px 16px; border-bottom:1px solid var(--line); background:var(--surface); position:sticky; top:0; z-index:5; }
  .exit { width:32px; height:32px; border-radius:9px; border:1px solid var(--line); background:var(--surface); display:flex; align-items:center; justify-content:center; cursor:pointer; color:var(--muted); font-size:15px; flex-shrink:0; }
  .exit:hover { background:var(--surface2); }
  .railwrap { flex:1; min-width:0; }
  .railtxt { display:flex; align-items:baseline; justify-content:space-between; gap:8px; margin-bottom:6px; }
  .railtxt .now { font-family:"Plus Jakarta Sans"; font-weight:800; font-size:15px; } .railtxt .now small { color:var(--muted); font-weight:600; }
  .railtxt .of { font-family:"Inter",system-ui,sans-serif;font-variant-numeric:tabular-nums; font-size:13.5px; color:var(--muted); flex-shrink:0; }
  .rail { display:flex; gap:8px; }
  .blockseg { display:flex; flex-direction:column; gap:3px; }
  .blockseg .pips { display:flex; gap:3px; flex-wrap:wrap; }
  .blockseg .pip { width:14px; height:6px; border-radius:3px; background:var(--surface3); box-sizing:border-box; }
  .blockseg .pip.done { background:var(--accent); }
  /* current = in play, never "done": hollow + accent ring (owner fix 2026-06-10) */
  .blockseg .pip.cur { background:var(--surface); border:1.5px solid var(--accent); box-shadow:0 0 0 2px var(--accent-soft); }
  .blockseg .bl { font-size:11px; font-family:"Inter",system-ui,sans-serif;font-variant-numeric:tabular-nums; color:var(--muted); }
  .modepill { font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:.05em; color:var(--muted); border:1px solid var(--line); border-radius:14px; padding:4px 10px; flex-shrink:0; }

  .wrap { max-width:560px; margin:0 auto; padding:22px 16px 40px; }

  /* block-begin card */
  .blockcard { background:var(--surface); border:1px solid var(--line); border-radius:var(--r-card); padding:24px 22px; box-shadow:0 16px 36px -26px rgba(20,30,55,.3); text-align:center; }
  .blockcard .ic { width:50px; height:50px; border-radius:14px; background:var(--accent-soft); display:flex; align-items:center; justify-content:center; margin:0 auto 14px; }
  .blockcard .ic svg { width:25px; height:25px; stroke:var(--accent); fill:none; stroke-width:1.8; }
  .blockcard h2 { font-size:21px; font-weight:800; letter-spacing:-.01em; }
  .blockcard .sub { color:var(--muted); font-size:13px; margin:5px auto 4px; max-width:360px; }
  .blockcard .meta { font-family:"Inter",system-ui,sans-serif;font-variant-numeric:tabular-nums; font-size:14px; color:var(--muted); margin:10px 0 18px; }

  .btn { font-family:"Plus Jakarta Sans"; font-weight:700; font-size:14px; padding:13px 16px; border-radius:12px; border:1px solid transparent; cursor:pointer; width:100%; display:block; text-align:center; text-decoration:none; }
  .btn.primary { background:var(--accent); color:#fff; box-shadow:0 10px 22px -10px var(--accent); transition:filter .15s ease; }
  .btn.primary:hover { filter:brightness(1.06); } .btn.primary:active { transform:translateY(1px); }
  .btn.ghost { background:var(--surface); border:1px solid var(--line); color:var(--ink); }
  .btn.ghost:hover { background:var(--surface2); }
  .skip { background:none; border:none; color:var(--muted); font-size:12.5px; text-decoration:underline; cursor:pointer; margin-top:12px; font-family:inherit; }

  /* transition beat */
  .trans { text-align:center; padding:38px 18px; }
  .trans .ic { width:46px; height:46px; border-radius:14px; background:var(--pos-soft); color:var(--pos); display:flex; align-items:center; justify-content:center; margin:0 auto 13px; }
  .trans h2 { font-size:18px; font-weight:800; }
  .trans .nx { color:var(--muted); font-size:13px; margin:6px auto 16px; max-width:340px; }
  .trans .nxt { display:inline-flex; align-items:center; gap:11px; border:1px solid var(--line); border-radius:13px; padding:12px 16px; background:var(--surface); text-align:left; }
  .trans .nxt .ic2 { width:32px; height:32px; border-radius:9px; background:var(--surface2); display:flex; align-items:center; justify-content:center; } .trans .nxt .ic2 svg { width:17px; height:17px; stroke:var(--accent); fill:none; stroke-width:1.8; }
  .trans .nxt .n { font-family:"Plus Jakarta Sans"; font-weight:700; font-size:13.5px; } .trans .nxt .s { font-size:11px; color:var(--muted); }
  .trans .continue { max-width:280px; margin:16px auto 0; }

  /* summary / payoff */
  .sum { text-align:center; padding:28px 18px; }
  .sum .crown { font-size:30px; }
  .sum h1 { font-size:24px; font-weight:800; margin:6px 0 2px; }
  .sum .ssub { color:var(--muted); font-size:13px; }
  .sum .stats { display:grid; grid-template-columns:repeat(3,1fr); gap:11px; margin:18px 0; }
  .stat { background:var(--surface); border:1px solid var(--line); border-radius:12px; padding:13px; }
  .stat .v { font-size:21px; font-weight:800; } .stat .v small { font-size:12px; color:var(--pos); font-weight:700; }
  .stat .k { font-size:10.5px; color:var(--muted); text-transform:uppercase; letter-spacing:.05em; font-weight:600; margin-top:2px; }
  .moved { background:var(--accent-soft); border:1px solid var(--accent-line); border-radius:12px; padding:12px 14px; text-align:left; display:flex; gap:10px; align-items:flex-start; margin-bottom:14px; }
  .ava { width:24px; height:24px; border-radius:8px; background:linear-gradient(140deg,var(--accent),var(--accent-2)); flex-shrink:0; }
  .moved .txt { font-size:13px; }
  .cta { display:flex; gap:10px; max-width:400px; margin:0 auto; } .cta .btn { flex:1; }

  /* error / empty */
  .ebanner { background:var(--bad-soft); border:1px solid var(--bad-line); border-radius:12px; padding:13px 15px; }
  .ebanner .t { font-weight:700; font-size:13px; color:var(--bad); font-family:"Plus Jakarta Sans"; }
  .ebanner .raw { font-family:"Inter",system-ui,sans-serif;font-variant-numeric:tabular-nums; font-size:11px; color:var(--bad-ink); margin-top:6px; white-space:pre-wrap; word-break:break-word; }
  .empty { text-align:center; padding:36px 18px; } .empty h2 { font-size:21px; font-weight:800; } .empty p { color:var(--muted); font-size:13px; margin:6px auto 16px; max-width:320px; } .empty .btn { max-width:280px; margin:0 auto; }
</style>
<script src="/js/coach-memory.js"></script>
<script src="/js/profile.js"></script>
<script type="module" src="/js/sync.js"></script>
</head>
<body>
<div id="focus-head"></div>
<div class="wrap" id="session-root"><!-- rendered by JS --></div>

<!-- App-level session streak (window.Streak), marked on session completion. -->
<script src="/js/streak.js"></script>
<script>
/* ============================================================================
 * session.html, the in-session WRAPPER (Loop 1, rebuilt v1.0 to Design's
 * rethink). Spec: redesign-spec §18 + design-explorations/in-session-flow.html
 * (2026-06-01, "session wrapper, not a launchpad").
 *
 * The session CONTAINS the drills: a segmented progress rail (one segment per
 * LIVE block, a pip per item) + a live "Mistake 3 of 8 · Block 1 of 2" readout.
 * Each block's solving happens in puzzle.html (Releases-A v0.13 round-trip):
 * "Begin block" deep-links to /puzzle.html?session=today&block=<id>; puzzle.html
 * filters to the block's ids, writes back blocks[idx].done, and returns to
 * /session.html on block completion → transition beat → next block → summary.
 * Only built block types are ever in plan.blocks, so a block can never dump the
 * user into the open Puzzles queue.
 *
 * Progress is recomputed from chess-coach-attempts-v1 each load, so it stays
 * correct whether puzzle.html wrote `done` or not.
 *
 * NO-SPOILER: never shows a puzzle's answer/motif/eval, only block titles,
 * counts, and aggregate session stats.
 * ==========================================================================*/
(function () {
  'use strict';
  var $ = function (id) { return document.getElementById(id); };
  var head = $('focus-head');
  var root = $('session-root');

  var KEY_ATTEMPTS = 'chess-coach-attempts-v1';
  var KEY_RATING   = 'chess-coach-user-rating-v1';
  var KEY_SESSION  = 'chess-coach-session-v1';
  var KEY_COMPLETE = 'chess-coach-session-complete-v1';

  function loadJson(key, fb) {
    try { var r = localStorage.getItem(key); if (r == null) return fb; var v = JSON.parse(r); return v == null ? fb : v; }
    catch (e) { return fb; }
  }
  function save(key, val) { try { localStorage.setItem(key, JSON.stringify(val)); } catch (e) {} }
  function esc(s) { return String(s == null ? '' : s).replace(/[&<>"]/g, function (c) { return ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' })[c]; }); }
  function todayKey() { var d = new Date(); return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0'); }

  var ICON = {
    mistakes: '<svg viewBox="0 0 24 24"><circle cx="12" cy="14" r="7"/><path d="M12 2v4"/></svg>',
    review:   '<svg viewBox="0 0 24 24"><path d="M3 12a9 9 0 1 0 9-9"/><path d="M3 4v5h5"/></svg>',
    recognition: '<svg viewBox="0 0 24 24"><path d="M12 3v4M3 12h4m10 0h4M12 17v4"/><circle cx="12" cy="12" r="4"/></svg>',
    endgames: '<svg viewBox="0 0 24 24"><path d="M5 20V9m4 11V4m4 16v-7m4 7V8"/></svg>',
    vision: '<svg viewBox="0 0 24 24"><path d="M2 12s4-7 10-7 10 7 10 7-4 7-10 7-10-7-10-7z"/><circle cx="12" cy="12" r="3"/></svg>',
    calculation: '<svg viewBox="0 0 24 24"><path d="M12 3a7 7 0 0 1 7 7c0 2.4-1.2 3.9-2.4 5.2-.8.9-1.6 1.8-1.6 2.8h-6c0-1-.8-1.9-1.6-2.8C6.2 13.9 5 12.4 5 10a7 7 0 0 1 7-7z"/><path d="M9.5 21h5"/></svg>',
    openings: '<svg viewBox="0 0 24 24"><path d="M12 2l2.4 7.4H22l-6.2 4.5 2.4 7.4L12 17l-6.2 4.3 2.4-7.4L2 9.4h7.6z"/></svg>'
  };
  // noun per block for the "Mistake 3 of 8" readout + short rail label
  var NOUN  = { mistakes: 'Mistake', review: 'Card', recognition: 'Position', endgames: 'Position', openings: 'Line', vision: 'Warm-up', calculation: 'Warm-up' };
  var SHORT = { mistakes: 'Mistakes', review: 'Review', recognition: 'Recognition', endgames: 'Endgames', openings: 'Openings', vision: 'Warm-up', calculation: 'Warm-up' };

  // ---- load ----
  var plan, attempts, ratingCache;
  try {
    plan = loadJson(KEY_SESSION, null);
    attempts = loadJson(KEY_ATTEMPTS, {}) || {};
    ratingCache = loadJson(KEY_RATING, null);
  } catch (e) {
    head.innerHTML = '';
    root.innerHTML = '<div class="ebanner"><div class="t">Could not load your session.</div><div class="raw">' + esc((e && e.stack) || String(e)) + '</div></div>';
    return;
  }
  var rating = (ratingCache && typeof ratingCache.rating === 'number') ? ratingCache.rating : null;

  function wireExit() { var e = $('exit-btn'); if (e) e.addEventListener('click', function () { window.location.href = '/today.html'; }); }

  // No active plan for today -> not a dead end.
  if (!plan || !Array.isArray(plan.blocks) || !plan.blocks.length || plan.date !== todayKey()) {
    head.innerHTML = '<div class="focus-top"><span class="exit" id="exit-btn" title="Exit to Today">✕</span><div class="railwrap"><div class="railtxt"><span class="now">Session</span></div></div></div>';
    root.innerHTML = '<div class="empty"><h2>No active session</h2><p>Head back to Today and tap Start session, the coach builds one from your recent games.</p><a class="btn primary" href="/today.html">Go to Today</a></div>';
    wireExit();
    return;
  }

  // ---- recompute per-block done from attempts (never regress) ----
  // P0 fix (hotfix/r1.2): count only puzzles solved DURING this session, not
  // lifetime solves. Drill sessions are repeatable, so a block built over
  // previously-solved puzzles must NOT load as already-complete (that bounced
  // the user straight to the summary). A puzzle counts toward `done` only if
  // its last solve is at/after the plan's createdAt. isSolved (lifetime) is
  // kept below for the accuracy stats, which are display-only.
  var sinceMs = (plan && plan.createdAt) ? (Date.parse(plan.createdAt) || 0) : 0;
  var recognition = {};
  try { recognition = JSON.parse(localStorage.getItem('chess-coach-recognition-v1') || '{}') || {}; } catch (e) {}
  if (!recognition.seen) recognition.seen = {};
  var endgames = {};
  try { endgames = JSON.parse(localStorage.getItem('chess-coach-eg-results-v1') || '{}') || {}; } catch (e) {}
  function blockType(b) {
    if (b && b.id === 'recognition') return 'recognition';
    if (b && b.id === 'endgames') return 'endgame';
    if (b && b.id === 'openings') return 'opening';
    if (b && (b.id === 'vision' || b.id === 'calculation')) return b.id;
    return 'mistake';
  }
  // RESOLVED (attempted) this session, pass OR fail. This is the progress
  // count; `correct` is tracked separately (v0.58-c2: the bar/summary used to
  // count only solves, so failed items never advanced).
  function warmupDone(which) {
    var key = which === 'vision' ? 'chess-coach-board-vision-v1' : 'chess-coach-calculation-v1';
    try { var st = JSON.parse(localStorage.getItem(key) || '{}') || {}; return st.completedDate === todayKey(); } catch (e) { return false; }
  }
  var openingCards = {};
  try { openingCards = (JSON.parse(localStorage.getItem('chess-coach-openings-v1') || '{}') || {}).cards || {}; } catch (e) {}
  function resolvedInSession(type, id) {
    if (type === 'recognition') { var r = recognition.seen[id]; if (r && typeof r === 'object') return r.at >= sinceMs; return typeof r === 'number' && r >= sinceMs; }
    if (type === 'endgame') { var e = endgames[id]; return !!(e && typeof e.lastAt === 'number' && e.lastAt >= sinceMs); }
    if (type === 'vision' || type === 'calculation') return warmupDone(type);
    if (type === 'opening') { var c = openingCards[id]; return !!(c && typeof c.lastSeen === 'number' && c.lastSeen >= sinceMs); }
    var a = attempts[id]; return !!(a && (Date.parse(a.lastAt) || 0) >= sinceMs);
  }
  function correctInSession(type, id) {
    if (type === 'recognition') { var r = recognition.seen[id]; return !!(r && typeof r === 'object' && r.correct === true && r.at >= sinceMs); }
    if (type === 'endgame') { var e = endgames[id]; return !!(e && e.lastResult === 'pass' && typeof e.lastAt === 'number' && e.lastAt >= sinceMs); }
    if (type === 'vision' || type === 'calculation') return warmupDone(type);
    if (type === 'opening') { var c = openingCards[id]; return !!(c && typeof c.lastSeen === 'number' && c.lastSeen >= sinceMs && c.streak > 0); }
    var a = attempts[id]; return !!(a && a.solved && (Date.parse(a.lastAt) || 0) >= sinceMs);
  }
  function isSolved(id) { var a = attempts[id]; return !!(a && a.solved); }
  plan.blocks.forEach(function (b) {
    var t = blockType(b);
    var resolvedCt = (b.ids || []).filter(function (id) { return resolvedInSession(t, id); }).length;
    var correctCt = (b.ids || []).filter(function (id) { return correctInSession(t, id); }).length;
    b.done = Math.max(b.done || 0, resolvedCt);
    if (b.done > b.count) b.done = b.count;
    b.correct = Math.min(Math.max(b.correct || 0, correctCt), b.done);
  });
  function blockComplete(b) { return (b.done || 0) >= (b.count || 0); }
  // Spec 21, recognition runs on its own page under the same session chrome
  // (persistent bar + the shared onItemResolved counting); other types run on
  // the canonical puzzle shell. Deep-links the right surface for the block.
  function blockHref(b) {
    if (b && b.id === 'vision') return '/board-vision.html?session=1';
    if (b && b.id === 'calculation') return '/calculation.html?session=1';
    var base = '/puzzle.html';
    if (b && b.id === 'recognition') base = '/endgame-recognition.html';
    else if (b && b.id === 'endgames') base = '/endgames.html';
    else if (b && b.id === 'openings') base = '/openings.html';
    return base + '?session=today&block=' + b.id;
  }
  var nLive = plan.blocks.length;

  // current block = first incomplete; persist idx so Today's resume is honest
  var curIdx = plan.blocks.findIndex(function (b) { return !blockComplete(b); });
  var allDone = curIdx === -1;
  plan.idx = allDone ? nLive : curIdx;
  save(KEY_SESSION, plan);

  function getTransition() { try { return sessionStorage.getItem('cc-session-transition'); } catch (e) { return null; } }
  function setTransition(v) { try { if (v == null) sessionStorage.removeItem('cc-session-transition'); else sessionStorage.setItem('cc-session-transition', v); } catch (e) {} }

  // ---- the segmented rail ----
  // activeIdx = the block currently in focus; itemCursor = next item index in it.
  function railHtml(activeIdx) {
    var segs = plan.blocks.map(function (b, bi) {
      var pips = '';
      for (var i = 0; i < (b.count || 0); i++) {
        var cls = (i < (b.done || 0)) ? 'done' : (bi === activeIdx && i === (b.done || 0) ? 'cur' : '');
        pips += '<span class="pip ' + cls + '"></span>';
      }
      var lbl = (SHORT[b.id] || b.title) + ' · ' + b.count + (blockComplete(b) ? ' ✓' : '');
      return '<div class="blockseg"><div class="pips">' + pips + '</div><div class="bl">' + esc(lbl) + '</div></div>';
    }).join('');
    return '<div class="rail">' + segs + '</div>';
  }
  function headHtml(activeIdx, nowText, ofText, mode) {
    return '<div class="focus-top"><span class="exit" id="exit-btn" title="Exit to Today">✕</span>' +
      '<div class="railwrap"><div class="railtxt"><span class="now">' + nowText + '</span>' +
      (ofText ? '<span class="of">' + ofText + '</span>' : '') + '</div>' + railHtml(activeIdx) + '</div>' +
      (mode ? '<span class="modepill">' + mode + '</span>' : '') + '</div>';
  }

  // ---- session summary stats ----
  function sessionStats() {
    var ids = [];
    plan.blocks.forEach(function (b) { (b.ids || []).forEach(function (id) { if (ids.indexOf(id) === -1) ids.push(id); }); });
    var solved = ids.filter(isSolved);
    // reps = items ATTEMPTED this session; correct = resolved correctly.
    var reps = plan.blocks.reduce(function (s, b) { return s + (b.done || 0); }, 0);
    var correct = plan.blocks.reduce(function (s, b) { return s + (b.correct || 0); }, 0);
    var accs = solved.map(function (id) {
      var a = attempts[id];
      return (a && typeof a.firstAccuracy === 'number') ? a.firstAccuracy : (a && typeof a.lastAccuracy === 'number') ? a.lastAccuracy : null;
    }).filter(function (v) { return v != null; });
    var acc = accs.length ? Math.round(accs.reduce(function (a, b) { return a + b; }, 0) / accs.length) : null;
    return { reps: reps, correct: correct, accuracy: acc };
  }

  // =====================================================================
  // SCREENS
  // =====================================================================
  function renderSummary() {
    head.innerHTML = headHtml(nLive, 'Session complete', '', null);
    var st = sessionStats();
    var pctToTarget = (rating != null) ? Math.max(0, Math.min(100, Math.round((rating - 950) / ((typeof KPProfile!=='undefined'?KPProfile.targetElo():1500) - 950) * 100))) : null;
    var read = 'Cleared your recent mistakes and the cards due today.';
    save(KEY_COMPLETE, { date: todayKey(), reps: st.reps, correct: st.correct, accuracy: st.accuracy, ratingDelta: null, tomorrow: 'the same areas', at: new Date().toISOString() });
    // Mark today's session streak here, this is where the session actually
    // completes (the "Streak secured" copy is shown below). markSessionDone is
    // idempotent for the day, so today.html re-marking on return is harmless.
    var streakNow = null;
    if (typeof Streak !== 'undefined') {
      try {
        var marked = Streak.markSessionDone(Streak.readStreak(), Streak.todayStr());
        Streak.writeStreak(marked.state);
        streakNow = marked.state.current;
      } catch (e) { /* non-fatal */ }
    }
    var thirdStat = (streakNow != null && streakNow > 0)
      ? '<div class="stat"><div class="v">🔥' + streakNow + '</div><div class="k">Day streak</div></div>'
      : (pctToTarget != null)
        ? '<div class="stat"><div class="v">' + pctToTarget + '<small>%</small></div><div class="k">To ' + (typeof KPProfile!=='undefined'?KPProfile.targetElo():1500) + '</div></div>'
        : '<div class="stat"><div class="v">🔥</div><div class="k">Streak</div></div>';
    root.innerHTML =
      '<div class="sum"><div class="crown">🔥</div><h1>Session complete</h1>' +
      '<div class="ssub">' + (streakNow ? streakNow + '-day streak secured' : 'Streak secured') + ' · ' + st.correct + ' of ' + st.reps + ' correct</div>' +
      '<div class="stats">' +
        '<div class="stat"><div class="v">' + st.correct + '<small>/' + st.reps + '</small></div><div class="k">Correct</div></div>' +
        '<div class="stat"><div class="v">' + (st.accuracy != null ? st.accuracy + '<small>%</small>' : ', ') + '</div><div class="k">Accuracy</div></div>' +
        thirdStat +
      '</div>' +
      '<div class="moved" id="debrief-slot"><span class="ava"></span><div class="txt">' + read + '</div></div>' +
      '<div class="cta"><a class="btn ghost" href="/today.html">Done</a><button class="btn primary" id="one-more">One more set</button></div></div>';
    wireExit();
    var om = $('one-more');
    if (om) om.addEventListener('click', function () { try { localStorage.removeItem(KEY_SESSION); } catch (e) {} window.location.href = '/today.html'; });
    fireSessionDebrief(st);
  }

  // =====================================================================
  // SESSION DEBRIEF (v0.79), the ONE proactive coach moment. Rule 5 (coach
  // panel discipline) forbids auto-injected coach messages MID-SOLVE; the
  // session boundary is the deliberate exception (logged in learnings v0.79):
  // a teacher debriefs you when the lesson ends. Aggregate-only no-spoiler
  // carve-out: motif COUNTS across the finished session may be named, but
  // never a specific puzzle's answer or move (failed items resurface via SRS).
  // Cached per-day so re-opening the summary never re-bills.
  // =====================================================================
  var KEY_DEBRIEF = 'chess-coach-debrief-v1';
  function debriefDigest(st) {
    var motifsSolved = {}, motifsMissed = {};
    var mistakesAll = loadJson('chess-coach-mistakes-v1', []) || [];
    var byId = {};
    (Array.isArray(mistakesAll) ? mistakesAll : []).forEach(function (m) { if (m && m.id) byId[m.id] = m; });
    plan.blocks.forEach(function (b) {
      if (blockType(b) !== 'mistake') return;
      (b.ids || []).forEach(function (id) {
        var m = byId[id]; if (!m || !m.motif) return;
        if (!resolvedInSession('mistake', id)) return;
        var bucket = correctInSession('mistake', id) ? motifsSolved : motifsMissed;
        bucket[m.motif] = (bucket[m.motif] || 0) + 1;
      });
    });
    return {
      blocks: plan.blocks.map(function (b) { return { title: b.title, done: b.done || 0, correct: b.correct || 0, count: b.count || 0 }; }),
      reps: st.reps, correct: st.correct, accuracy: st.accuracy,
      motifsSolved: motifsSolved, motifsMissed: motifsMissed,
      rating: rating
    };
  }
  function renderDebriefCard(card) {
    var slot = $('debrief-slot');
    if (!slot || !card) return;
    import('/js/coach-card.js').then(function (mod) {
      mod.ensureCoachCardStyles();
      slot.innerHTML = '';
      mod.renderCoachCard(slot, card, { append: true, scroll: false });
    }).catch(function () { /* keep the static read */ });
  }
  function fireSessionDebrief(st) {
    var cached = loadJson(KEY_DEBRIEF, null);
    if (cached && cached.date === todayKey() && cached.card) { renderDebriefCard(cached.card); return; }
    if (!st || !st.reps) return; // nothing to debrief
    var digest = debriefDigest(st);
    var memBlock = '';
    try { if (typeof CoachMemory !== 'undefined') memBlock = CoachMemory.writerBlock(CoachMemory.read()); } catch (e) {}
    var SYS = [
      'You are the student\'s chess teacher debriefing them right after they finished today\'s training session.',
      'They are rated approximately ' + (rating || 950) + ' on Chess.com rapid, targeting ' + (typeof KPProfile!=='undefined'?KPProfile.targetElo():1500) + '. Plain language for that level, no 2000+ jargon.',
      '',
      'You are given a DIGEST (JSON) of the session: per-block results, accuracy, and aggregate tactical-motif counts (solved vs missed). Ground EVERY claim only in it.',
      'HARD RULES:',
      '- Aggregate feedback only: name motifs and counts, NEVER a specific puzzle\'s move or answer (missed puzzles come back for retry).',
      '- Warm, specific, honest. No empty praise; tie every point to a number from the digest.',
      '- No markdown, no bullet lists, no em-dashes, no UCI notation.',
      '',
      'Return ONLY this JSON (no fences, no prose outside the object):',
      '{ "lead": "...", "points": [{ "label": "...", "text": "...", "tone": "bad|warn|pos|muted" }], "question": "...", "grounded": "...", "memory_notes": ["..."] }',
      '- lead: one line on how the session went, tied to the numbers.',
      '- points: 2-3 labelled points (e.g. Strong on / Slipped on / Tomorrow), tones matching.',
      '- question: one reflective question.',
      '- grounded: the source, e.g. "Today: N of M correct."',
      '- memory_notes: your consolidated long-term notes about this student.',
      memBlock,
    ].join('\n');
    fetch('/api/coach', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ model: 'claude-sonnet-4-6', max_tokens: 600, system: SYS, messages: [{ role: 'user', content: 'SESSION DIGEST:\n' + JSON.stringify(digest) }] })
    }).then(function (r) { return r.json().then(function (data) { if (!r.ok) throw new Error('HTTP ' + r.status); return data; }); })
      .then(function (data) {
        var txt = (data.content && data.content[0] && data.content[0].text) || '';
        var parsed = null;
        try { parsed = JSON.parse(txt.replace(/^```(?:json)?\s*|\s*```$/g, '')); } catch (e) { return; }
        if (!parsed || !parsed.lead) return;
        var card = { lead: parsed.lead, points: parsed.points, question: parsed.question, grounded: parsed.grounded };
        save(KEY_DEBRIEF, { date: todayKey(), card: card, at: new Date().toISOString() });
        renderDebriefCard(card);
        // Memory consolidation, the debrief is the ONE writer (coach-memory.js).
        try {
          if (typeof CoachMemory !== 'undefined' && Array.isArray(parsed.memory_notes)) {
            CoachMemory.write(CoachMemory.applyUpdate(CoachMemory.read(), parsed.memory_notes));
          }
        } catch (e) { /* memory is enrichment, never a blocker */ }
      })
      .catch(function () { /* offline / API down: the static read stays */ });
  }

  function renderTransition(finishedIdx) {
    var finished = plan.blocks[finishedIdx];
    var next = plan.blocks[finishedIdx + 1];
    head.innerHTML = headHtml(finishedIdx, 'Block ' + (finishedIdx + 1) + ' complete', (next ? 'Block ' + (finishedIdx + 2) + ' of ' + nLive + ' next' : 'Last block done'), null);
    var nxtCard = next
      ? '<div class="nxt"><span class="ic2">' + (ICON[next.id] || '') + '</span><div><div class="n">' + esc(next.title) + '</div><div class="s">' + esc(next.sub) + '</div></div></div>'
      : '';
    root.innerHTML =
      '<div class="trans"><div class="ic"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 13l4 4L19 7"/></svg></div>' +
      '<h2>' + esc(finished.title) + ' done · ' + finished.count + ' of ' + finished.count + '</h2>' +
      '<div class="nx">' + (next ? 'Next block:' : 'That was the last block.') + '</div>' +
      nxtCard +
      '<div class="continue"><button class="btn primary" id="continue-btn">Continue</button></div></div>';
    wireExit();
    var c = $('continue-btn');
    if (c) c.addEventListener('click', function () { setTransition(null); if (next) renderBlock(); else renderSummary(); });
  }

  function renderBlock() {
    curIdx = plan.blocks.findIndex(function (b) { return !blockComplete(b); });
    if (curIdx === -1) { renderSummary(); return; }
    plan.idx = curIdx; save(KEY_SESSION, plan);
    var b = plan.blocks[curIdx];
    var noun = NOUN[b.id] || 'Puzzle';
    var nowText = esc(b.title) + ' <small>· Block ' + (curIdx + 1) + ' of ' + nLive + '</small>';
    var ofText = noun + ' ' + Math.min((b.done || 0) + 1, b.count) + ' of ' + b.count;
    head.innerHTML = headHtml(curIdx, nowText, ofText, b.mode === 'deep' ? 'Deep' : 'Drill');
    root.innerHTML =
      '<div class="blockcard"><div class="ic">' + (ICON[b.id] || '') + '</div>' +
      '<h2>' + esc(b.title) + '</h2>' +
      '<div class="sub">' + esc(b.sub) + '</div>' +
      '<div class="meta">' + ofText + (b.mode === 'deep' ? ' · Deep mode' : '') + '</div>' +
      '<a class="btn primary" href="' + blockHref(b) + '">' + ((b.done || 0) > 0 ? 'Continue block' : 'Begin block') + ' →</a>' +
      '<button class="skip" id="skip-btn">Skip this block</button></div>';
    wireExit();
    var sk = $('skip-btn');
    if (sk) sk.addEventListener('click', function () {
      var finishedIdx = curIdx;
      b.done = b.count; save(KEY_SESSION, plan);
      if (plan.blocks[finishedIdx + 1]) renderTransition(finishedIdx); else renderSummary();
    });
  }

  // ---- entry routing ----
  if (allDone) { renderSummary(); return; }
  // If a block just completed (e.g. returning from puzzle.html), show its beat.
  var lastCompleted = -1;
  for (var i = 0; i < plan.blocks.length; i++) { if (blockComplete(plan.blocks[i])) lastCompleted = i; else break; }
  if (lastCompleted >= 0 && lastCompleted === curIdx - 1 && getTransition() !== String(lastCompleted)) {
    setTransition(String(lastCompleted));
    renderTransition(lastCompleted);
  } else {
    renderBlock();
  }
})();
</script>
</body>
</html>
