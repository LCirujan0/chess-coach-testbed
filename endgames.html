    <span class="brand-word">KnightPath</span>
    <span class="screen-chip">Endgames</span>

  <div class="layout-grid">
    <div class="session-wrap hidden" id="session-wrap"></div>

    <div class="lg-head">
      <div id="status-text" class="inline-status"></div>
    </div>

    <div class="lg-left">
      <div class="board-wrap">
        <div class="material-row material-top" id="material-top"></div>
        <div id="board" class="board"></div>
        <svg id="board-annotations" class="board-annotations" viewBox="0 0 800 800" preserveAspectRatio="none"></svg>
        <div class="material-row material-bottom" id="material-bottom"></div>
      </div>
      <div id="eval-bar" class="eg-evalbar hidden" aria-hidden="true">
        <div class="eg-evalbar-track"><div id="eval-bar-fill" class="eg-evalbar-fill"></div></div>
        <div id="eval-bar-num" class="eg-evalbar-num">0.0</div>
      </div>
      <div class="controls" id="controls-row">
        <button id="retry-btn" class="btn" disabled>Retry</button>
        <button id="prev-btn" class="btn">← Prev</button>
        <button id="next-btn" class="btn">Next →</button>
      </div>
    </div>

    <div class="lg-right">
      <!-- PAGE-SPECIFIC: lesson "feedback" card — same position as puzzle's result card -->
      <div class="lesson-card" id="lesson-card">
        <div id="lesson-group-badge" class="lesson-group-badge">Loading…</div>
        <div id="lesson-title" class="lesson-title">—</div>
        <div id="lesson-stm" class="lesson-stm">—</div>
        <div class="lesson-meta-row">
          <button id="show-technique-btn" class="technique-btn">Show technique</button>
          <span id="advanced-badge" class="advanced-badge hidden">Advanced</span>
        </div>
        <div id="technique-text" class="technique-text hidden"></div>
      </div>
      <div id="verdict-card" class="verdict-card hidden">
        <div id="verdict-headline" class="verdict-headline"></div>
        <div id="verdict-detail" style="font-size:13px;color:var(--muted);margin-bottom:10px;"></div>
      </div>
      <div class="lesson-list-card" id="lesson-list"></div>

      <!-- ALWAYS-PRESENT coach -->
      <div class="coach-card">
        <div class="coach-header">
          <span class="coach-avatar">C</span>
          <span class="coach-title">Coach</span>
          <span class="coach-status">Online</span>
        </div>
        <div class="coach-log" id="coach-log">
          <div class="msg system">Working an endgame? Ask the coach for the plan — no spoilers.</div>
        </div>
        <form class="coach-input-row" id="coach-form">
          <input type="text" class="coach-input" id="coach-input" placeholder="Ask the coach…" autocomplete="off">
          <button type="submit" class="coach-send" id="coach-send" disabled>Send</button>
        </form>
      </div>
    </div>
  </div>
</div>

<script type="module" src="/js/puzzle/playout.js"></script>
<script type="module">
  import { mountCoachWidget } from '/js/coach-widget.js';
  import { mountMaterial } from '/js/material.js';
  import { state } from '/js/puzzle/state.js';
  // Resolve the CURRENT lesson so the coach is grounded in this specific
  // endgame's goal + technique (not generic "play an endgame"). playout.js owns
  // the lesson index in its own module scope, but it writes the lesson title to
  // #lesson-title and loads every lesson into state.puzzles — so we match the
  // on-screen title back to its lesson record to read goal (result/targetEval)
  // and technique (keyIdea). Grounding the goal + technique is safe: the endgame
  // is a teaching position, not a hidden-answer puzzle.
  function currentLesson() {
    const titleEl = document.getElementById('lesson-title');
    const title = titleEl ? titleEl.textContent.trim() : '';
    if (!title || !Array.isArray(state.puzzles)) return null;
    return state.puzzles.find((p) => p && (p.type === 'endgame' || p.puzzleType === 'endgame') && (p.title || '') === title) || null;
  }
  // Live snapshot of the play-out the student is in (shared state.chess set by
  // playout.js). Played moves + FEN + this lesson's goal/technique. No engine
  // evals (no-spoiler rule) — but naming the technique is the point here.
  function liveEndgameContext() {
    let ctx = '';
    const lesson = currentLesson();
    if (lesson) {
      const goal = lesson.result === 'draw' ? 'hold the draw' : 'win the position';
      const target = lesson.targetEval ? (' Target: ' + lesson.targetEval + '.') : '';
      ctx += ' Current lesson: "' + (lesson.title || '') + '". Goal: ' + goal + '.' + target;
      if (lesson.keyIdea) ctx += ' Technique to coach toward: ' + lesson.keyIdea;
    }
    const g = state && state.chess;
    if (g && typeof g.history === 'function') {
      const moves = g.history();
      const turn = g.turn() === 'w' ? 'White' : 'Black';
      ctx += ' Live position the student is playing out: FEN ' + g.fen()
        + '. Moves played so far: ' + (moves.length ? moves.join(' ') : 'none yet')
        + '. ' + turn + ' to move. Discuss the moves actually played; never reveal'
        + ' engine evaluations or name the single best move.';
    }
    return ctx;
  }
  mountCoachWidget({
    logEl: document.getElementById('coach-log'),
    formEl: document.getElementById('coach-form'),
    inputEl: document.getElementById('coach-input'),
    sendEl: document.getElementById('coach-send'),
    context: 'The user is playing out a chess endgame technique against the engine. Coach them on the goal and the technique for this specific lesson.',
    getLiveContext: liveEndgameContext
  });
  mountMaterial(document.getElementById('board'), document.getElementById('material-top'), document.getElementById('material-bottom'));
</script>
