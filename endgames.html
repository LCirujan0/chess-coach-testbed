<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;600;700;800&family=Inter:wght@400;500;600;700&family=Spline+Sans+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root { --accent:#2F9E76; --accent-2:#5FB58F; --accent-soft:#E7F4EE; --ink:#1B1D22; --muted:#6E727B; --surface:#FFFFFF; --surface2:#F2F4F7; --surface3:#E9ECF1; --line:rgba(0,0,0,.10); --pos:#1F9D57; --warn:#C98A2E; --bad:#D2553F; --r-card:16px; --r-panel:14px; --r-btn:12px; --r-pill:20px; --light-sq:#ECE3D2; --dark-sq:#B49A78; --hl-move:rgba(47,158,118,.26); --hl-sel:rgba(47,158,118,.36); --r-board:9px; }
  * { box-sizing:border-box; margin:0; padding:0; }
  html, body { background: radial-gradient(120% 60% at 50% -10%, #FFFFFF, #EDF0F3 80%); background-attachment:fixed; min-height:100vh; }
  body { font-family:"Inter",-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif; color:var(--ink); padding: max(12px, env(safe-area-inset-top)) max(16px, env(safe-area-inset-right)) max(90px, env(safe-area-inset-bottom)) max(16px, env(safe-area-inset-left)); line-height:1.5; -webkit-font-smoothing:antialiased; }
  .container { max-width:640px; margin:0 auto; }
  h1, .page-title, .nav-brand-name { font-family:"Plus Jakarta Sans","Inter",sans-serif; }
  .header-bar { display:flex; align-items:center; gap:12px; margin-bottom:14px; position:sticky; top:calc(-1 * max(12px, env(safe-area-inset-top))); z-index:50; background:rgba(255,255,255,0.75); backdrop-filter:blur(12px); -webkit-backdrop-filter:blur(12px); padding:max(12px, env(safe-area-inset-top)) 0 12px 0; margin-top:calc(-1 * max(12px, env(safe-area-inset-top))); }
  .page-title { font-size:18px; font-weight:700; letter-spacing:-.01em; }
  .header-brand-mark { width:24px; height:24px; object-fit:contain; flex-shrink:0; }

  /* Nav drawer */
  .nav-drawer { position:fixed; top:0; left:0; width:288px; max-width:84vw; height:100vh; background:var(--surface); border-right:1px solid var(--line); transform:translateX(-100%); transition:transform 200ms ease; z-index:100; padding:20px 14px; overflow-y:auto; display:flex; flex-direction:column; gap:4px; box-shadow:0 20px 40px -22px rgba(20,30,55,.25); }
  .nav-drawer.open { transform:translateX(0); }
  .nav-brand { display:flex; align-items:center; gap:10px; padding:6px 8px 14px; margin-bottom:6px; border-bottom:1px solid var(--line); }
  .nav-brand-mark { width:30px; height:30px; border-radius:0; background:none; box-shadow:none; object-fit:contain; flex-shrink:0; }
  .nav-brand-name { font-weight:700; font-size:15px; }
  .nav-group-label { font-size:10px; font-weight:700; letter-spacing:.1em; text-transform:uppercase; color:var(--muted); padding:12px 10px 4px; }
  .nav-drawer-link { display:flex; align-items:center; gap:11px; padding:10px 12px; border-radius:10px; font-size:14px; font-weight:600; color:var(--ink); text-decoration:none; transition:background .15s ease; }
  .nav-drawer-link:hover { background:var(--surface2); }
  .nav-drawer-link.active { background:var(--accent); color:#fff; box-shadow:0 6px 14px -8px var(--accent); }
  .nav-drawer-link .nav-icon { width:18px; height:18px; flex-shrink:0; display:inline-flex; align-items:center; justify-content:center; }
  .nav-drawer-link svg.nav-icon { stroke:currentColor; fill:none; }
  .nav-drawer-link svg.nav-icon .filldot { fill:currentColor; stroke:none; }
  .nav-drawer-link.coming { color:var(--muted); }
  .version-stamp { margin-top:auto; padding:10px 12px 4px; font-size:10px; color:var(--muted); font-family:"Spline Sans Mono",ui-monospace,monospace; letter-spacing:.02em; border-top:1px solid var(--line); }
  .nav-backdrop { position:fixed; inset:0; background:rgba(15,20,30,.45); z-index:99; opacity:0; pointer-events:none; transition:opacity 200ms ease; }
  .nav-backdrop.open { opacity:1; pointer-events:auto; }
  .tab-bar { position:fixed; bottom:0; left:0; right:0; display:flex; background:var(--surface); border-top:1px solid var(--line); z-index:90; padding:6px 6px max(env(safe-area-inset-bottom, 6px), 6px); box-shadow:0 -8px 22px -16px rgba(15,20,40,.16); }
  .tab-bar a { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:2px; padding:7px 4px; border-radius:10px; font-size:10px; font-weight:600; color:var(--muted); text-decoration:none; transition:color .15s ease; }
  .tab-bar a.active { color:var(--accent); }
  .tab-bar a .tab-icon { width:22px; height:22px; }
  .tab-bar a svg.tab-icon { stroke:currentColor; fill:none; }
  .tab-bar a svg.tab-icon .filldot { fill:currentColor; stroke:none; }
  @media (min-width: 880px) {
    body { padding-left:248px; padding-right:28px; padding-bottom:28px; font-size:15px; }
    .container { max-width:1100px; margin-left:0; margin-right:auto; }
    .tab-bar { display:none; }
    .nav-drawer { position:fixed !important; top:0; left:0; width:224px !important; max-width:224px !important; height:100vh; transform:none !important; border-right:1px solid var(--line); background:var(--surface); padding:22px 14px 18px; z-index:10; }
    .nav-backdrop { display:none !important; }
  }

  /* ── Endgame trainer ── */
  .lesson-card { background:var(--surface); border:1px solid var(--line); border-radius:var(--r-panel); padding:14px 16px; margin-bottom:12px; box-shadow:0 8px 22px -14px rgba(30,40,70,.3); }
  .lesson-group-badge { display:inline-flex; align-items:center; padding:3px 9px; background:var(--surface2); color:var(--muted); font-size:10px; font-weight:700; letter-spacing:.07em; text-transform:uppercase; border-radius:var(--r-pill); margin-bottom:8px; }
  .lesson-title { font-family:"Plus Jakarta Sans","Inter",sans-serif; font-weight:800; font-size:18px; line-height:1.25; margin-bottom:5px; }
  .lesson-stm { font-size:13px; color:var(--muted); margin-bottom:10px; }
  .lesson-meta-row { display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
  .technique-btn { padding:7px 13px; background:var(--surface2); border:1px solid var(--line); border-radius:var(--r-btn); font-size:12px; font-weight:600; color:var(--ink); cursor:pointer; font-family:inherit; transition:background .12s ease; }
  .technique-btn:hover { background:var(--surface3); }
  .technique-text { margin-top:10px; padding:10px 12px; background:var(--accent-soft); border-left:3px solid var(--accent); border-radius:6px; font-size:13px; line-height:1.5; color:var(--ink); }
  .advanced-badge { display:inline-flex; padding:3px 8px; background:#FFF3E0; color:var(--warn); font-size:10px; font-weight:700; letter-spacing:.06em; text-transform:uppercase; border-radius:var(--r-pill); }

  /* Board — canonical component (css/board.css, §22) */
  /* .board-wrap layout + canonical board size now come from css/screen.css (v0.55). */

  /* Status + verdict */
  #status-line { min-height:22px; font-size:13px; color:var(--muted); text-align:center; margin-bottom:8px; font-style:italic; }
  .verdict-card { background:var(--surface); border:1px solid var(--line); border-radius:var(--r-panel); padding:14px 16px; margin-bottom:12px; box-shadow:0 4px 14px -10px rgba(30,40,70,.3); }
  .verdict-headline { font-family:"Plus Jakarta Sans","Inter",sans-serif; font-weight:800; font-size:16px; margin-bottom:8px; }
  .verdict-headline.pass { color:var(--pos); }
  .verdict-headline.fail { color:var(--bad); }
  .why-btn { padding:8px 16px; background:var(--surface2); border:1px solid var(--line); border-radius:var(--r-btn); font-size:13px; font-weight:600; cursor:pointer; font-family:inherit; transition:background .12s ease; margin-top:4px; }
  .why-btn:hover:not(:disabled) { background:var(--surface3); }
  .why-btn:disabled { opacity:.5; cursor:not-allowed; }
  .why-output { margin-top:10px; padding:11px 13px; background:var(--surface2); border-radius:10px; font-size:13px; line-height:1.55; }

  /* Controls */
  .controls-row { display:flex; gap:8px; justify-content:center; margin-bottom:14px; flex-wrap:wrap; }
  .ctrl-btn { padding:9px 18px; background:var(--surface); border:1px solid var(--line); border-radius:var(--r-btn); font-size:13px; font-weight:700; cursor:pointer; font-family:inherit; color:var(--ink); transition:transform .15s cubic-bezier(.34,1.56,.64,1), background .15s ease; box-shadow:0 1px 3px rgba(0,0,0,.05); }
  .ctrl-btn:hover:not(:disabled) { background:var(--surface2); }
  .ctrl-btn:active { transform:translateY(1px); }
  .ctrl-btn:disabled { opacity:.45; cursor:not-allowed; }
  .ctrl-btn.primary { background:var(--accent); color:#fff; border-color:var(--accent); box-shadow:0 4px 12px -6px var(--accent); }
  .ctrl-btn.primary:hover:not(:disabled) { filter:brightness(1.07); }

  /* Lesson list */
  .lesson-list-card { background:var(--surface); border:1px solid var(--line); border-radius:var(--r-panel); overflow:hidden; margin-bottom:14px; }
  .lesson-list-header { padding:10px 14px; font-size:11px; font-weight:700; letter-spacing:.08em; text-transform:uppercase; color:var(--muted); border-bottom:1px solid var(--line); background:var(--surface2); }
  .lesson-list-group { padding:8px 0 4px; }
  .lesson-list-group-label { padding:4px 14px 2px; font-size:10px; font-weight:700; letter-spacing:.07em; text-transform:uppercase; color:var(--muted); }
  .lesson-list-item { display:flex; align-items:center; gap:10px; padding:9px 14px; cursor:pointer; transition:background .12s ease; border-bottom:1px solid var(--line); }
  .lesson-list-item:last-child { border-bottom:none; }
  .lesson-list-item:hover { background:var(--surface2); }
  .lesson-list-item.active { background:var(--accent-soft); }
  .lesson-list-name { flex:1; font-size:13px; font-weight:600; }
  .lesson-list-result { font-size:11px; color:var(--muted); }
  .mastery-pips { display:flex; gap:3px; }
  .pip { width:7px; height:7px; border-radius:50%; background:var(--surface3); border:1px solid var(--line); }
  .pip.filled { background:var(--accent); border-color:var(--accent); }
  .pip.mastered { background:var(--warn); border-color:var(--warn); }
  .hidden { display:none !important; }
  .nav-drawer-link.secondary { font-size:13px; padding:7px 12px; color:var(--muted); }
  .nav-drawer-link.secondary:hover { background:var(--surface2); }
  .nav-drawer-link.secondary.active { background:none; color:var(--accent); box-shadow:none; font-weight:700; }
  .nav-separator { border:none; border-top:1px solid var(--line); margin:8px 0; }

  /* ── Eval bar (white-advantage), v0.55b — lives in the board column beside
        the board; updated from the engine eval after each move (async). ── */
  .eval-wrap { display:flex; align-items:stretch; gap:12px; }
  .eval-wrap .board-wrap { flex:1; min-width:0; }
  .eval-bar{display:none !important}
  .eval-bar { position:relative; width:14px; flex-shrink:0; border-radius:7px; overflow:hidden; background:var(--ink); border:1px solid var(--line); box-shadow:0 8px 22px -16px rgba(30,40,70,.4); align-self:stretch; min-height:120px; }
  /* white fill grows from the bottom; the remaining top is black (the bar bg). */
  .eval-bar .eval-white { position:absolute; left:0; right:0; bottom:0; background:#F4F1EA; transition:height .35s cubic-bezier(.4,0,.2,1); height:50%; }
  .eval-bar .eval-mid { position:absolute; left:0; right:0; top:50%; height:1px; background:var(--accent); opacity:.7; }
  .eval-label { font-family:"Spline Sans Mono",ui-monospace,monospace; font-size:11px; font-weight:500; color:var(--muted); text-align:center; margin-top:6px; min-height:15px; letter-spacing:.02em; }
  @media (min-width:880px) { .eval-bar { width:18px; } }
</style>

<script type="module">
// ── Error surface ──────────────────────────────────────────────────────────────
function surfaceError(msg) {
  var sl = document.getElementById('status-line');
  if (sl) { sl.style.color = 'var(--bad)'; sl.style.fontStyle = 'normal'; sl.textContent = msg; }
}
window.addEventListener('error', (e) => surfaceError('JS error: ' + e.message));
window.addEventListener('unhandledrejection', (e) => surfaceError('Error: ' + (e.reason && e.reason.message || e.reason)));

// ── Imports from js/puzzle/ ────────────────────────────────────────────────────
// Chess.js: game logic, legal-move generation, FEN parsing (synchronous; the
//   human move never waits on anything else).
// config.js: PIECE_IMG for Celtic piece set, board geometry constants.
// engine.js: parseMultiPV + pvToSan + normalizeEval (pure UCI parsing utilities).
import { Chess } from './js/puzzle/lib.js';
import { PIECE_IMG, PIECE_GLYPH, FILES_STD, RANKS_STD, FILES_FLIP, RANKS_FLIP } from './js/puzzle/config.js';
import { parseMultiPV, pvToSan, normalizeEval } from './js/puzzle/engine.js';
import { renderSessionWrap } from '/js/session-wrap.js';

// ── Constants ─────────────────────────────────────────────────────────────────
const SF_URL = '/engine/stockfish-17.1-lite-single-03e3232.js';
// localStorage: unchanged key + unchanged record shape (attempts/cleanInARow/
// mastered/lastResult/lastAt). v0.55b reuses it as-is — no new key.
const STORAGE_KEY = 'chess-coach-endgames-v1';

// Search budget. v0.55b ROOT-CAUSE FIX: the old code drove the engine at
// `go depth 20`. A depth-20 single-threaded lite search in a basic mate floods
// the main thread with thousands of `info` strings (each one is a worker->main
// message that the await-handler scanned), so every reply stalled the tab for
// seconds and the board looked frozen. We now match the proven puzzle surface
// (depth 14) AND hard-cap each search with a movetime so a pathological
// position can never run unbounded. Both bounds are honoured by Stockfish; the
// first of the two to hit ends the search.
const SF_DEPTH       = 14;     // analysis/reply depth (was 20)
const SF_MOVETIME_MS = 1200;   // hard wall-clock cap per search

// Win/draw/loss classification thresholds, in centipawns from the side-to-move
// (trainee) point of view. Mate scores are normalised to +/-10000 upstream.
const WINNING_CP   =  200;     // >= +2.0  => winning
const LOSING_CP    = -200;     // <= -2.0  => losing
// (between the two = roughly drawn / unclear)
const DECISIVE_CP  =  600;     // >= +6.0  => win effectively converted
const DRAW_HELD_MOVES = 16;    // hold a draw this many trainee moves => success
const MAX_TRAINEE_MOVES = 40;  // absolute safety cap on a single exercise

// ── State ─────────────────────────────────────────────────────────────────────
const eg = {
  lessons: [],
  idx: 0,
  chess: null,
  orientation: null,       // { files, ranks }
  traineeColor: 'w',
  usedTechnique: false,
  evalHistory: [],         // {move, cp, cls} after each trainee move (trainee PoV)
  worstCp: null,           // worst (lowest) trainee-PoV eval seen
  worstMove: null,         // trainee move number at the worst eval
  spoilMove: null,         // trainee move number when the result was spoiled
  phase: 'idle',           // 'idle'|'playing'|'thinking'|'done'
  traineeMovesPlayed: 0,
  selectedSquare: null,
  legalMovesFromSelected: [],
  lastMove: null,
  storage: {},
  sfWorker: null,
  sfReady: false,
  outcome: null,           // 'win'|'draw'|'loss'|null  (final classification)
  passed: null,            // boolean
  lastEvalCp: 0,           // last known trainee-PoV eval, for the bar
};

// ── Storage helpers (key + shape unchanged) ────────────────────────────────────
function loadStorage() {
  try { eg.storage = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}') || {}; } catch { eg.storage = {}; }
}
function saveStorage() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(eg.storage)); } catch {}
}
function getEntry(id) {
  return eg.storage[id] || { attempts: 0, cleanInARow: 0, mastered: false, lastResult: null, lastAt: null };
}
function saveResult(id, passed, clean) {
  const e = getEntry(id);
  e.attempts++;
  e.lastResult = passed ? 'pass' : 'fail';
  e.lastAt = Date.now();
  if (passed && clean) {
    e.cleanInARow = (e.cleanInARow || 0) + 1;
    if (e.cleanInARow >= 2) e.mastered = true;
  } else {
    e.cleanInARow = 0;
  }
  eg.storage[id] = e;
  saveStorage();
}

// ── Stockfish (Worker — all engine work is off the main thread) ─────────────────
// Mirrors the puzzle surface's proven wiring. The human move is committed to the
// board synchronously (chess.js only); the engine reply + eval are awaited and
// the board updates again when they arrive. The click path NEVER waits on the
// engine and NEVER busy-loops.
function sfSend(msg) { eg.sfWorker.postMessage(msg); }

// Wait for a line containing `matcher`. Mirrors the proven puzzle surface
// (js/puzzle/engine.js sfWaitFor): the listener is attached synchronously in
// the Promise executor, we accumulate EVERY message, and resolve on the matched
// line (clearing the timeout + removing the listener). `onAttached` (optional)
// fires immediately AFTER the listener is live so the caller can post `go` with
// the listener guaranteed to be attached first — closing the race where a fast
// depth-14/movetime-1200 `bestmove` arrives before the listener and is missed.
function sfWaitForEG(matcher, timeoutMs = 60000, onAttached) {
  return new Promise((resolve, reject) => {
    const messages = [];
    const t = setTimeout(() => {
      eg.sfWorker.removeEventListener('message', handler);
      reject(new Error('SF timeout waiting for: ' + matcher));
    }, timeoutMs);
    function handler(e) {
      const msg = typeof e.data === 'string' ? e.data : '';
      messages.push(msg);
      if (msg.indexOf(matcher) !== -1) {
        clearTimeout(t);
        eg.sfWorker.removeEventListener('message', handler);
        resolve({ matched: msg, all: messages });
      }
    }
    eg.sfWorker.addEventListener('message', handler);
    if (typeof onAttached === 'function') onAttached();
  });
}

async function initSF() {
  if (eg.sfWorker) return;
  setStatus('Loading engine…');
  eg.sfWorker = new Worker(SF_URL);
  await sfWaitForEG('uciok', 25000, function () { eg.sfWorker.postMessage('uci'); });
  eg.sfWorker.postMessage('setoption name MultiPV value 1');
  await sfWaitForEG('readyok', 15000, function () { eg.sfWorker.postMessage('isready'); });
  eg.sfReady = true;
  setStatus('');
}

// Lazily boot + await the engine. The board is playable before this resolves;
// the trainee's move lands instantly and the reply follows when ready. On
// failure we surface a recoverable error rather than dropping the interaction.
let egEnginePromise = null;
async function ensureEngineReady() {
  if (eg.sfReady) return true;
  setStatus('Loading engine…');
  try {
    if (!egEnginePromise) egEnginePromise = initSF();
    await egEnginePromise;
    return eg.sfReady === true;
  } catch (err) {
    egEnginePromise = null;
    surfaceError('Engine failed to load. Tap Retry to try again.');
    return false;
  }
}

// Analyse `fen` to depth SF_DEPTH (movetime-capped). Returns
// { eval:{cp|mate}, pvUci:[...] } or null. Fully async (awaited Worker round-trip).
async function analyzeEG(fen) {
  sfSend('ucinewgame');
  // The listener is attached inside sfWaitForEG BEFORE the `go` is posted (via
  // the onAttached callback), so the bestmove can never arrive unobserved.
  const { all } = await sfWaitForEG('bestmove', 60000, function () {
    sfSend('position fen ' + fen);
    sfSend('go depth ' + SF_DEPTH + ' movetime ' + SF_MOVETIME_MS);
  });
  const lines = parseMultiPV(all, 1);
  if (!lines.length) return null;
  const l = lines[0];
  // Stockfish reports score from the SIDE-TO-MOVE's point of view. Capture the
  // side to move of the analysed FEN so callers can convert to an absolute
  // (white) perspective rather than guessing the turn from call-site position.
  const stm = (fen.split(' ')[1] === 'b') ? 'b' : 'w';
  return { eval: l.scoreType === 'mate' ? { mate: l.scoreVal } : { cp: l.scoreVal }, pvUci: l.pvMoves, stm };
}

// ── Eval bar ────────────────────────────────────────────────────────────────────
// `cp` is from WHITE's point of view. The white fill height maps a clamped
// +/-1000cp window onto 5%..95% so a decisive edge pins near the end without
// fully hiding the other colour. Updates are CSS-transitioned, never blocking.
function setEvalBar(whiteCp, label) {
  const white = document.getElementById('eval-white');
  const lbl = document.getElementById('eval-label');
  if (white) {
    const clamped = Math.max(-1000, Math.min(1000, whiteCp));
    const pct = 50 + (clamped / 1000) * 45; // 5%..95%
    white.style.height = pct.toFixed(1) + '%';
  }
  if (lbl) lbl.textContent = label || '';
}
function evalLabelFor(whiteCp, mate) {
  if (mate !== undefined && mate !== null) return 'M' + Math.abs(mate);
  const p = (whiteCp / 100);
  const sign = p > 0 ? '+' : '';
  return sign + p.toFixed(1);
}
// Convert a trainee-PoV eval object to a WHITE-PoV centipawn number for the bar.
function whiteCpFromTrainee(evalObj) {
  const traineeCp = normalizeEval(evalObj);
  return eg.traineeColor === 'w' ? traineeCp : -traineeCp;
}
// Convert an engine eval (reported from the SIDE-TO-MOVE's PoV) into an
// absolute WHITE-perspective centipawn value, using the side to move of the
// analysed FEN. Positive => white is better. Mate scores are normalised to
// +/-10000 by normalizeEval first, then sign-flipped the same way.
function whiteCpFromEngine(evalObj, stm) {
  const stmCp = normalizeEval(evalObj);
  return stm === 'w' ? stmCp : -stmCp;
}
// Map a white-absolute centipawn value to the trainee's point of view.
function traineeCpFromWhite(whiteCp) {
  return eg.traineeColor === 'w' ? whiteCp : -whiteCp;
}

// ── Classification (trainee point of view) ──────────────────────────────────────
function classify(cp) {
  if (cp >= WINNING_CP) return 'win';
  if (cp <= LOSING_CP) return 'loss';
  return 'draw';
}

// ── Board rendering ───────────────────────────────────────────────────────────
// NOTE (v0.55b): the board click listener is bound EXACTLY ONCE (see init()),
// delegated on the stable #board element. renderBoardEG only swaps children via
// replaceChildren — it does NOT (re)bind any listener. The old code re-added a
// click listener on every render (one `{once:true}` + one `onclick`), which
// double-fired onSquareTap per tap and churned listeners; that is gone.
function renderBoardEG() {
  const boardEl = document.getElementById('board');
  if (!eg.chess || !eg.orientation) { boardEl.replaceChildren(); return; }
  const { files, ranks } = eg.orientation;
  const locked = (eg.phase !== 'playing');
  const board = eg.chess.board();
  const frag = document.createDocumentFragment();
  for (let r = 0; r < 8; r++) {
    for (let f = 0; f < 8; f++) {
      const square = files[f] + ranks[r];
      const stdRank = RANKS_STD.indexOf(ranks[r]);
      const stdFile = FILES_STD.indexOf(files[f]);
      const piece = board[stdRank][stdFile];
      const sq = document.createElement('div');
      sq.className = 'square ' + ((stdRank + stdFile) % 2 === 0 ? 'light' : 'dark');
      if (locked) sq.classList.add('locked');
      if (eg.selectedSquare === square) sq.classList.add('selected');
      if (eg.lastMove && (eg.lastMove.from === square || eg.lastMove.to === square)) sq.classList.add('last-move');
      sq.dataset.square = square;
      if (r === 7) { const lbl = document.createElement('span'); lbl.className = 'coord file'; lbl.textContent = files[f]; sq.appendChild(lbl); }
      if (f === 0) { const lbl = document.createElement('span'); lbl.className = 'coord rank'; lbl.textContent = ranks[r]; sq.appendChild(lbl); }
      if (piece) {
        const img = document.createElement('img');
        img.className = 'pc-img';
        img.src = PIECE_IMG(piece.color, piece.type);
        img.alt = PIECE_GLYPH[piece.type] || (piece.color + piece.type);
        img.draggable = false;
        sq.appendChild(img);
      }
      const move = eg.legalMovesFromSelected.find((m) => m.to === square);
      if (move) {
        const isCapture = move.flags.includes('c') || move.flags.includes('e');
        const marker = document.createElement('span');
        marker.className = isCapture ? 'legal-ring' : 'legal-dot';
        sq.appendChild(marker);
      }
      frag.appendChild(sq);
    }
  }
  boardEl.replaceChildren(frag);
}

function onBoardClick(e) {
  // Selection/commit only needs chess.js — never the engine. This handler
  // returns synchronously; the (async) engine reply is kicked off via
  // handleTraineeMove() but is NOT awaited here, so the click can't block.
  if (eg.phase !== 'playing') return;
  const sq = e.target.closest('.square');
  if (!sq) return;
  const square = sq.dataset.square;
  if (square) onSquareTap(square);
}

function onSquareTap(square) {
  if (eg.phase !== 'playing') return;
  if (!eg.selectedSquare) {
    const piece = eg.chess.get(square);
    if (!piece || piece.color !== eg.chess.turn()) return;
    eg.selectedSquare = square;
    eg.legalMovesFromSelected = eg.chess.moves({ square, verbose: true });
    renderBoardEG();
    return;
  }
  if (square === eg.selectedSquare) {
    eg.selectedSquare = null; eg.legalMovesFromSelected = []; renderBoardEG(); return;
  }
  const here = eg.chess.get(square);
  if (here && here.color === eg.chess.turn()) {
    eg.selectedSquare = square;
    eg.legalMovesFromSelected = eg.chess.moves({ square, verbose: true });
    renderBoardEG();
    return;
  }
  const move = eg.legalMovesFromSelected.find((m) => m.to === square);
  if (move) {
    const m = eg.chess.move({ from: move.from, to: move.to, promotion: 'q' });
    if (m) {
      eg.selectedSquare = null; eg.legalMovesFromSelected = [];
      eg.lastMove = { from: m.from, to: m.to };
      eg.phase = 'thinking';
      renderBoardEG();          // human move shows INSTANTLY (synchronous)
      handleTraineeMove();      // async; intentionally not awaited
    }
  }
}

// ── Main move handler (free play; stop only on spoil/success) ────────────────────
async function handleTraineeMove() {
  eg.traineeMovesPlayed++;
  const lesson = eg.lessons[eg.idx];

  // Trainee just moved: if that ended the game, resolve immediately.
  if (eg.chess.isGameOver()) { resolveGameOver(lesson, 'trainee'); return; }

  const ready = await ensureEngineReady();
  if (!ready) { eg.phase = 'playing'; renderBoardEG(); return; }
  setStatus('Thinking…');

  // 1) Evaluate the position AFTER the trainee's move. The engine is to move,
  //    so the raw score is from the opponent's PoV. We convert via white-
  //    absolute (see below) instead of a hard-coded negate.
  let line = await analyzeEG(eg.chess.fen());
  if (!line) { setStatus('Engine error, tap Retry'); eg.phase = 'playing'; renderBoardEG(); return; }
  // Engine score is from the side-to-move of the analysed FEN. Convert to an
  // absolute WHITE perspective first, then map to the trainee. This is robust
  // whoever is to move (after the trainee moves it is the opponent's turn, so a
  // winning white position comes back negative from black's PoV).
  let whiteCp = whiteCpFromEngine(line.eval, line.stm);
  let traineeCp = traineeCpFromWhite(whiteCp);
  recordEval(traineeCp);
  setEvalBar(whiteCp, evalLabelFor(whiteCp, line.eval && line.eval.mate));

  // 2) Spoil / success check from the trainee's PoV.
  const stop = null;
  if (stop) { finishExercise(lesson, stop.passed, stop.outcome); return; }

  // 3) Engine plays its reply (best move from the same search).
  const engineUci = line.pvUci && line.pvUci[0];
  if (!engineUci) { finishExercise(lesson, lesson.result === 'win', lesson.result === 'win' ? 'win' : 'draw'); return; }
  const em = eg.chess.move({ from: engineUci.slice(0,2), to: engineUci.slice(2,4), promotion: engineUci.slice(4,5) || undefined });
  if (!em) { setStatus('Engine move error.'); eg.phase = 'playing'; renderBoardEG(); return; }
  eg.lastMove = { from: em.from, to: em.to };

  // Engine's move may end the game.
  if (eg.chess.isGameOver()) { renderBoardEG(); resolveGameOver(lesson, 'engine'); return; }

  // 4) Refresh the eval/bar now that it's the trainee's turn again. We still
  //    convert via white-absolute so the perspective is derived from the FEN,
  //    not assumed from the call site.
  line = await analyzeEG(eg.chess.fen());
  if (line) {
    const whiteCpNow = whiteCpFromEngine(line.eval, line.stm);
    eg.lastEvalCp = traineeCpFromWhite(whiteCpNow);
    setEvalBar(whiteCpNow, evalLabelFor(whiteCpNow, line.eval && line.eval.mate));
  }

  // 5) Continue free play unless we've hit a sensible stop.
  if (lesson.result === 'draw' && eg.traineeMovesPlayed >= DRAW_HELD_MOVES) {
    finishExercise(lesson, true, 'draw'); return;
  }
  if (eg.traineeMovesPlayed >= MAX_TRAINEE_MOVES) {
    const finalCp = eg.lastEvalCp != null ? eg.lastEvalCp : traineeCp;
    const cls = classify(finalCp);
    const passed = lesson.result === 'win' ? cls === 'win' : cls !== 'loss';
    finishExercise(lesson, passed, cls === 'win' ? 'win' : cls === 'loss' ? 'loss' : 'draw');
    return;
  }

  eg.phase = 'playing';
  renderBoardEG();
  setStatus('');
}

// Record a trainee-PoV eval and track the worst dip (for the overall summary).
function recordEval(cp) {
  eg.lastEvalCp = cp;
  eg.evalHistory.push({ move: eg.traineeMovesPlayed, cp, cls: classify(cp) });
  if (eg.worstCp === null || cp < eg.worstCp) { eg.worstCp = cp; eg.worstMove = eg.traineeMovesPlayed; }
}

// Decide whether the exercise should STOP now, based on the lesson target and
// the current trainee-PoV eval. Returns null to keep playing, else
// { passed, outcome }. We only stop on a genuine spoil or a converted win.
function evaluateStop(lesson, cp) {
  // Require a valid engine eval before any stop decision. Without a finite cp we
  // keep playing rather than misclassify a missing/zero eval as a spoil.
  if (typeof cp !== 'number' || !Number.isFinite(cp)) return null;
  const cls = classify(cp);
  if (lesson.result === 'win') {
    // Win converted decisively => success.
    if (cp >= DECISIVE_CP) return { passed: true, outcome: 'win' };
    // The win has slipped out of "winning" into a draw/loss => stop (spoiled).
    if (cls !== 'win') { if (eg.spoilMove === null) eg.spoilMove = eg.traineeMovesPlayed; return { passed: false, outcome: cls }; }
  } else { // draw
    // The draw has slipped into a loss => stop (spoiled).
    if (cls === 'loss') { if (eg.spoilMove === null) eg.spoilMove = eg.traineeMovesPlayed; return { passed: false, outcome: 'loss' }; }
  }
  return null;
}

// Resolve a true game-over (mate / stalemate / draw by rule).
function resolveGameOver(lesson, mover) {
  if (eg.chess.isCheckmate()) {
    // Side to move is checkmated. If the engine just moved, the TRAINEE is mated.
    const traineeMated = (mover === 'engine');
    if (traineeMated) finishExercise(lesson, false, 'loss');
    else finishExercise(lesson, true, 'win'); // trainee delivered mate
    return;
  }
  // Stalemate / insufficient material / repetition / 50-move => drawn.
  finishExercise(lesson, lesson.result === 'draw', 'draw');
}

// ── Overall feedback (NOT move-by-move) ─────────────────────────────────────────
function finishExercise(lesson, passed, outcome) {
  eg.phase = 'done';
  eg.passed = passed;
  eg.outcome = outcome;
  const clean = passed && !eg.usedTechnique;
  saveResult(lesson.id, passed, clean);

  const headline = verdictHeadline(lesson, passed, outcome);
  const summary = buildSummary(lesson, passed, outcome);

  document.getElementById('verdict-card').classList.remove('hidden');
  const hl = document.getElementById('verdict-headline');
  hl.className = 'verdict-headline ' + (passed ? 'pass' : 'fail');
  hl.textContent = (passed ? '✓ ' : '✗ ') + headline;
  document.getElementById('verdict-detail').textContent = summary
    + (clean ? ' Clean, counts toward mastery.' : (passed && eg.usedTechnique ? ' Passed (technique shown, not clean).' : ''));
  document.getElementById('why-btn').disabled = false;
  document.getElementById('retry-btn').disabled = false;
  renderBoardEG();
  updateLessonList();
  setStatus('');
}

function verdictHeadline(lesson, passed, outcome) {
  if (lesson.result === 'win') return passed ? 'Won it.' : (outcome === 'loss' ? 'Lost it.' : 'Win slipped to a draw.');
  return passed ? 'Drew it.' : 'Draw lost.';
}

// Deterministic OVERALL summary — one or two sentences about how it went, no
// per-ply commentary and no spoiler (no future best move, no concrete squares).
function buildSummary(lesson, passed, outcome) {
  const n = eg.traineeMovesPlayed;
  const worstP = eg.worstCp != null ? (eg.worstCp / 100) : null;
  if (lesson.result === 'win') {
    if (passed) {
      if (worstP != null && worstP < (WINNING_CP / 100)) {
        return 'You converted the win in ' + n + ' move' + (n === 1 ? '' : 's') + ', though the edge wobbled around move ' + eg.worstMove + ' before you brought it home.';
      }
      return 'Clean technique. You kept the advantage in hand and converted the win in ' + n + ' move' + (n === 1 ? '' : 's') + '.';
    }
    // Failed a win
    const where = eg.spoilMove || eg.worstMove || n;
    if (outcome === 'loss') return 'The winning position turned into a loss around move ' + where + '; the advantage was let go and the engine took over.';
    return 'You held the edge early but it slipped around move ' + where + ' and the win drained away to a draw.';
  }
  // Draw lesson
  if (passed) {
    return 'You held the draw for ' + n + ' move' + (n === 1 ? '' : 's') + ' under engine pressure. The defensive setup stayed solid.';
  }
  const where = eg.spoilMove || eg.worstMove || n;
  return 'The defence held for a while but cracked around move ' + where + ', and the position slipped into a loss.';
}

// ── "Why?" — overall, no-spoiler coach line (optional) ──────────────────────────
async function handleWhy() {
  const lesson = eg.lessons[eg.idx];
  const btn = document.getElementById('why-btn');
  const out = document.getElementById('why-output');
  btn.disabled = true;
  btn.textContent = 'Thinking…';
  out.classList.add('hidden');
  const SYS = [
    'You are a chess coach giving an OVERALL reflection on how a student played out an endgame they just finished.',
    'Explain the principle behind the result, anchored on the key idea.',
    'HARD RULES:',
    '- Do NOT give move-by-move commentary.',
    '- Do NOT mention specific moves, squares, piece destinations, or eval numbers.',
    '- Do NOT tell the student what to play next or reveal a solution line.',
    '- Focus on the technique and pattern, not concrete moves.',
    '- 2-3 sentences maximum. Plain language for a ~950-1500 rated player.',
  ].join('\n');
  const resultLine = eg.passed
    ? (lesson.result === 'win' ? 'They converted the win.' : 'They held the draw.')
    : (lesson.result === 'win' ? 'The win slipped away.' : 'The draw was lost.');
  const userMsg = [
    'Lesson: ' + lesson.title,
    'Key idea: ' + lesson.keyIdea,
    'Outcome: ' + resultLine,
    'It took about ' + eg.traineeMovesPlayed + ' of the student’s moves.',
  ].join('\n');
  try {
    const resp = await fetch('/api/coach', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ model: 'claude-sonnet-4-6', max_tokens: 200, system: SYS, messages: [{ role: 'user', content: userMsg }] }),
    });
    const data = await resp.json();
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    const text = (data.content && data.content[0] && data.content[0].text) || '(no explanation)';
    out.textContent = text.trim();
    out.classList.remove('hidden');
    btn.textContent = 'Got it';
  } catch (err) {
    out.textContent = 'Could not load explanation: ' + err.message;
    out.classList.remove('hidden');
    btn.textContent = 'Why?';
    btn.disabled = false;
  }
}

// ── Lesson loading ────────────────────────────────────────────────────────────
function loadLesson(idx) {
  if (!eg.lessons.length) return;
  eg.idx = Math.max(0, Math.min(idx, eg.lessons.length - 1));
  const lesson = eg.lessons[eg.idx];

  eg.chess = new Chess(lesson.fen);
  eg.traineeColor = lesson.sideToMove;
  eg.orientation = lesson.sideToMove === 'w'
    ? { files: FILES_STD, ranks: RANKS_STD }
    : { files: FILES_FLIP, ranks: RANKS_FLIP };
  eg.usedTechnique = false;
  eg.evalHistory = [];
  eg.worstCp = null;
  eg.worstMove = null;
  eg.spoilMove = null;
  eg.outcome = null;
  eg.passed = null;
  eg.lastEvalCp = 0;
  eg.phase = 'playing';
  eg.traineeMovesPlayed = 0;
  eg.selectedSquare = null;
  eg.legalMovesFromSelected = [];
  eg.lastMove = null;

  document.getElementById('lesson-group-badge').textContent = lesson.group;
  document.getElementById('lesson-title').textContent = lesson.title;
  const stmLabel = (lesson.sideToMove === 'w' ? 'White' : 'Black') + ' to move · '
    + (lesson.result === 'win' ? 'Play for the win' : 'Hold the draw');
  document.getElementById('lesson-stm').textContent = stmLabel;
  const advBadge = document.getElementById('advanced-badge');
  lesson.advanced ? advBadge.classList.remove('hidden') : advBadge.classList.add('hidden');

  const techText = document.getElementById('technique-text');
  techText.classList.add('hidden');
  techText.textContent = '';
  document.getElementById('show-technique-btn').textContent = 'Show technique';

  document.getElementById('verdict-card').classList.add('hidden');
  document.getElementById('why-output').classList.add('hidden');
  document.getElementById('why-btn').textContent = 'Why?';
  document.getElementById('why-btn').disabled = false;
  document.getElementById('retry-btn').disabled = true;

  // Neutral eval bar at the start; it fills in on the first analysis.
  setEvalBar(0, '');

  renderBoardEG();
  setStatus('');
  updateLessonList();
}

// ── Lesson list ───────────────────────────────────────────────────────────────
function updateLessonList() {
  const container = document.getElementById('lesson-list');
  const groups = {};
  for (const l of eg.lessons) {
    if (!groups[l.group]) groups[l.group] = [];
    groups[l.group].push(l);
  }
  container.innerHTML = '';
  const hdr = document.createElement('div');
  hdr.className = 'lesson-list-header';
  hdr.textContent = 'All lessons';
  container.appendChild(hdr);
  for (const [grpName, items] of Object.entries(groups)) {
    const grpEl = document.createElement('div');
    grpEl.className = 'lesson-list-group';
    const grpLbl = document.createElement('div');
    grpLbl.className = 'lesson-list-group-label';
    grpLbl.textContent = grpName;
    grpEl.appendChild(grpLbl);
    for (const l of items) {
      const e = getEntry(l.id);
      const item = document.createElement('div');
      item.className = 'lesson-list-item' + (eg.lessons[eg.idx] && eg.lessons[eg.idx].id === l.id ? ' active' : '');
      item.addEventListener('click', () => loadLesson(eg.lessons.indexOf(l)));
      const name = document.createElement('div');
      name.className = 'lesson-list-name';
      name.textContent = l.title;
      const pips = document.createElement('div');
      pips.className = 'mastery-pips';
      for (let i = 0; i < 2; i++) {
        const pip = document.createElement('span');
        pip.className = 'pip' + (e.mastered ? ' mastered' : (e.cleanInARow > i ? ' filled' : ''));
        pips.appendChild(pip);
      }
      const res = document.createElement('div');
      res.className = 'lesson-list-result';
      res.textContent = e.mastered ? '★ Mastered' : (e.lastResult ? (e.lastResult === 'pass' ? '✓ Pass' : '✗ Fail') : '');
      item.appendChild(name);
      item.appendChild(pips);
      item.appendChild(res);
      grpEl.appendChild(item);
    }
    container.appendChild(grpEl);
  }
}

// ── Helpers ───────────────────────────────────────────────────────────────────
function setStatus(text) {
  const el = document.getElementById('status-line');
  if (!el) return;
  el.style.color = '';
  el.style.fontStyle = text ? 'italic' : '';
  el.textContent = text;
}

// ── Wiring ────────────────────────────────────────────────────────────────────
document.getElementById('show-technique-btn').addEventListener('click', () => {
  const techText = document.getElementById('technique-text');
  const lesson = eg.lessons[eg.idx];
  if (!lesson) return;
  if (techText.classList.contains('hidden')) {
    techText.textContent = lesson.keyIdea;
    techText.classList.remove('hidden');
    document.getElementById('show-technique-btn').textContent = 'Hide technique';
    eg.usedTechnique = true;
  } else {
    techText.classList.add('hidden');
    document.getElementById('show-technique-btn').textContent = 'Show technique';
  }
});
document.getElementById('retry-btn').addEventListener('click', () => { if (eg.lessons[eg.idx]) loadLesson(eg.idx); });
document.getElementById('prev-btn').addEventListener('click', () => { if (eg.idx > 0) loadLesson(eg.idx - 1); });
document.getElementById('next-btn').addEventListener('click', () => { if (eg.idx < eg.lessons.length - 1) loadLesson(eg.idx + 1); });
document.getElementById('why-btn').addEventListener('click', handleWhy);

// Board clicks: ONE delegated listener on the stable #board element, bound once.
document.getElementById('board').addEventListener('click', onBoardClick);

// ── Initialisation ────────────────────────────────────────────────────────────
async function init() {
  loadStorage();
  setStatus('Loading lessons…');
  try {
    const resp = await fetch('/data/endgames.json');
    const data = await resp.json();
    eg.lessons = data.lessons || [];
  } catch (err) {
    surfaceError('Failed to load lessons: ' + err.message);
    return;
  }
  if (!eg.lessons.length) { surfaceError('No lessons found in endgames.json'); return; }
  renderSessionWrap(document.getElementById('session-wrap'), { exitHref: '/session.html' });
  loadLesson(0);
  // Board is playable immediately (selection needs only chess.js). Warm the
  // engine in the background so the first reply is snappy, but never block play.
  ensureEngineReady().then(async function () {
    setStatus('');
    renderBoardEG();
    // Show the true starting eval instead of a flat 50/50 (e.g. KQK reads as a
    // decisive white edge). Non-blocking; guarded so a transient engine miss
    // just leaves the neutral bar. Only paint if we're still on the same,
    // un-started lesson (no trainee move yet) to avoid clobbering live play.
    if (!eg.sfReady || !eg.chess) return;
    const startFen = eg.chess.fen();
    const movesAtStart = eg.traineeMovesPlayed;
    try {
      const line = await analyzeEG(startFen);
      if (line && eg.chess && eg.chess.fen() === startFen && eg.traineeMovesPlayed === movesAtStart) {
        // Convert from the analysed FEN's side-to-move into white-absolute, then map to trainee.
        const whiteCpStart = whiteCpFromEngine(line.eval, line.stm);
        eg.lastEvalCp = traineeCpFromWhite(whiteCpStart);
        const mate = line.eval && line.eval.mate;
        setEvalBar(whiteCpStart, evalLabelFor(whiteCpStart, mate));
      }
    } catch (_) { /* leave the neutral bar; play is unaffected */ }
  });
}

init();
</script>
