<style>
  /* Page chrome = shared shell.css + nav.css. */
  h1, .page-title, .nav-brand-name, .panel-title, .aha { font-family:"Plus Jakarta Sans","Inter",sans-serif; }

  .eyebrow { font-size:10.5px; text-transform:uppercase; letter-spacing:.12em; font-weight:700; color:var(--accent); margin-bottom:6px; margin-top:6px; }
  h1 { font-size:28px; font-weight:800; letter-spacing:-.02em; line-height:1.1; margin-bottom:14px; }

  .ratestrip { display:flex; align-items:center; gap:18px; flex-wrap:wrap; border:1px solid var(--line); border-radius:var(--r-panel); padding:14px 16px; background:var(--surface); box-shadow:0 10px 24px -20px rgba(20,30,55,.3); margin-bottom:6px; }
  .rating-value { font-family:"Plus Jakarta Sans",sans-serif; font-size:34px; font-weight:800; letter-spacing:-.02em; line-height:1; } .rating-value small { font-size:13px; color:var(--pos); font-weight:700; margin-left:6px; }
  .rating-meta { font-size:11.5px; color:var(--muted); margin-top:3px; }
  .rating-meta .delta-up { color:var(--pos); font-weight:600; } .rating-meta .delta-down { color:var(--bad); font-weight:600; }
  .traj-wrap { flex:1; min-width:200px; } .traj-wrap svg { width:100%; height:48px; display:block; }
  .traj-empty { font-size:11px; color:var(--muted); }
  @media (max-width:560px) { .ratestrip { flex-direction:column; align-items:stretch; } .traj-wrap { width:100%; } }

  .aha { font-weight:800; font-size:18px; margin:18px 0 4px; line-height:1.25; } .aha .leakw { color:var(--endg); }
  .ahasub { font-size:12.5px; color:var(--muted); margin-bottom:12px; }
  .phases { display:grid; grid-template-columns:repeat(3,1fr); gap:12px; } @media (max-width:640px) { .phases { grid-template-columns:1fr; } }
  .phase { border:1px solid var(--line); border-radius:14px; padding:15px; position:relative; overflow:hidden; background:var(--surface); }
  .phase .topdot { position:absolute; left:0; top:0; bottom:0; width:4px; }
  .phase .top { font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:.06em; color:var(--muted); }
  .phase .score { font-family:"Plus Jakarta Sans"; font-weight:800; font-size:36px; line-height:1; margin:6px 0 2px; }
  .phase .bar { height:6px; border-radius:4px; background:var(--surface3); overflow:hidden; margin-top:8px; } .phase .bar i { display:block; height:100%; border-radius:4px; }
  .phase .sub { font-size:11.5px; color:var(--muted); margin-top:8px; }
  .phase.leak { border-color:var(--endg); background:linear-gradient(180deg,var(--warn-soft),#fff); box-shadow:0 14px 30px -22px rgba(201,138,46,.6); }
  .phase .flag { position:absolute; top:11px; right:11px; font-size:9.5px; font-weight:800; text-transform:uppercase; letter-spacing:.04em; color:#fff; background:var(--endg); border-radius:6px; padding:2px 7px; }
  .phase .impact { font-family:"Spline Sans Mono"; font-size:12px; color:var(--endg); font-weight:600; margin-top:6px; }

  .panel { margin-top:16px; } /* visual props from shared .panel (shell.css) */
  .panel-title { font-size:14px; font-weight:800; letter-spacing:-.01em; }
  .ph2 { display:flex; align-items:center; justify-content:space-between; gap:8px; margin-bottom:12px; } .ph2 .ov { font-size:11px; color:var(--muted); } .ph2 .ov b { color:var(--ink); font-family:"Plus Jakarta Sans"; }
  .cgrp { margin-bottom:12px; } .cgrp:last-child { margin-bottom:0; }
  .cgrp .gh { font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:.06em; margin-bottom:5px; display:flex; align-items:center; gap:6px; } .cgrp .gh i { width:8px; height:8px; border-radius:50%; }
  .comp { display:flex; align-items:center; gap:10px; font-size:12.5px; padding:5px 0; border-bottom:1px solid var(--surface2); } .comp:last-child { border:none; }
  .comp .nm { flex:1; } .comp .ti { font-family:"Spline Sans Mono"; font-size:11px; color:var(--muted); } .comp .ti.calib { color:var(--warn); } .comp .ti.nodata { color:var(--muted); font-style:italic; }

  @keyframes heat-grow {
    from { transform: scaleY(0); opacity: 0; }
    to { transform: scaleY(1); opacity: 1; }
  }
  @keyframes spin { 100% { transform: rotate(360deg); } }
  .calib-ring { width: 32px; height: 32px; border: 4px solid var(--surface2); border-top-color: var(--warn); border-radius: 50%; animation: spin 1s linear infinite; margin: 6px 0; }

  .heat-h { display:flex; align-items:baseline; justify-content:space-between; gap:8px; margin-bottom:4px; } .heat-h .t { font-family:"Plus Jakarta Sans"; font-weight:800; font-size:14px; } .heat-h .u { font-size:10.5px; color:var(--muted); }
  .bands { display:flex; gap:6px; align-items:flex-end; height:180px; margin-top:8px; }
  .band { flex:1; display:flex; flex-direction:column; justify-content:flex-end; align-items:center; gap:4px; height:100%; }
  .band .bar { width:100%; border-radius:5px 5px 0 0; min-height:3px; transform-origin: bottom; animation: heat-grow 0.6s cubic-bezier(0.16, 1, 0.3, 1) both; }
  .band .bar.nodata { background:repeating-linear-gradient(45deg, var(--surface3), var(--surface3) 4px, #eef1f4 4px, #eef1f4 8px); }
  .band .pct { font-family:"Spline Sans Mono",monospace; font-size:9.5px; color:var(--ink); } .band .pct.none { color:var(--muted); }
  .band .lab { font-family:"Spline Sans Mono",monospace; font-size:8.5px; color:var(--muted); }
  .phaselegend { display:flex; gap:14px; margin-top:12px; font-size:11px; color:var(--muted); } .phaselegend i { display:inline-block; width:10px; height:10px; border-radius:3px; margin-right:5px; vertical-align:middle; }
  .heatnote { font-size:12px; color:var(--muted); margin-top:10px; } .heatnote b { color:var(--ink); font-family:"Plus Jakarta Sans"; }

  .review1 { background:var(--accent-soft); border:1px solid var(--accent-line); border-radius:12px; padding:12px 14px; display:flex; align-items:center; gap:10px; margin-top:16px; text-decoration:none; color:inherit; }
  .review1 .ava { width:24px; height:24px; border-radius:8px; background:linear-gradient(140deg,var(--accent),var(--accent-2)); flex-shrink:0; } .review1 .tx { flex:1; font-size:13px; } .review1 .tx b { font-family:"Plus Jakarta Sans"; } .review1 .go { font-size:12px; color:var(--accent); font-weight:700; }

  .empty-state { padding:24px; text-align:center; color:var(--muted); font-size:13px; line-height:1.5; }
  .empty-state .btn { display:inline-block; margin-top:12px; padding:10px 18px; background:var(--accent); color:#fff; border-radius:var(--r-btn); text-decoration:none; font-weight:700; font-family:"Plus Jakarta Sans"; }
  .ebanner { background:var(--bad-soft); border:1px solid var(--bad-line); border-radius:10px; padding:11px 13px; margin-top:8px; } .ebanner .t { font-weight:700; font-size:12.5px; color:var(--bad); } .ebanner .raw { font-family:"Spline Sans Mono",monospace; font-size:10.5px; color:var(--bad-ink); margin-top:5px; }


  /* rating profile block (C-surface — peak / record / tactics / settledness) */
  .ratecard { background:var(--surface); border:1px solid var(--line); border-radius:var(--r-card); padding:18px 20px; margin-top:16px; box-shadow:0 10px 24px -18px rgba(20,30,55,.22); }
  .ratecard .rc-head { display:flex; align-items:baseline; justify-content:space-between; gap:8px; margin-bottom:14px; }
  .ratecard .rc-title { font-size:14px; font-weight:800; letter-spacing:-.01em; font-family:"Plus Jakarta Sans",sans-serif; }
  .ratecard .rc-when { font-size:10.5px; color:var(--muted); }
  .rc-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:12px; } @media (max-width:560px){ .rc-grid { grid-template-columns:repeat(2,1fr); } }
  .rc-stat { border:1px solid var(--line); border-radius:12px; padding:12px 13px; background:var(--surface); }
  .rc-stat .k { font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:.06em; color:var(--muted); }
  .rc-stat .v { font-family:"Plus Jakarta Sans",sans-serif; font-weight:800; font-size:24px; line-height:1; margin-top:6px; }
  .rc-stat .v small { font-size:11px; font-weight:700; color:var(--muted); margin-left:4px; }
  .rc-stat .v.muted { color:var(--muted); }
  .rc-stat .x { font-size:11px; color:var(--muted); margin-top:5px; }
  .rc-settle { font-size:12.5px; margin-top:14px; padding:10px 12px; border-radius:10px; line-height:1.45; }
  .rc-settle.settled { background:var(--accent-soft); border:1px solid var(--accent-line); color:var(--ink); }
  .rc-settle.settling { background:var(--warn-soft); border:1px solid #EAD9B6; color:var(--ink); }
  .rc-settle b { font-family:"Plus Jakarta Sans",sans-serif; }
  .rc-causal { font-size:12.5px; color:var(--muted); margin-top:10px; } .rc-causal b { color:var(--ink); font-family:"Plus Jakarta Sans",sans-serif; }

  @media (min-width: 880px) { h1 { font-size:32px; } }
</style>

<script>
/* insights.html — phase-score rethink (Loop 1, v1.0). Spec: redesign-spec §8 +
 * design-explorations/insights.html (2026-06-01) + engineering spec 04 "Phase
 * scores". Leads with opening/middlegame/endgame scores; weakest flagged as the
 * biggest leak with an estimated rating cost. Seven component tiers demoted to a
 * secondary detail grouped by phase. Severity split dropped. Accepted
 * exposure-corrected heatmap kept. NO-SPOILER: aggregate history only. */
(function () {
  'use strict';
  var $ = function (id) { return document.getElementById(id); };
  var root = $('insights-root');

  var KEY_MISTAKES = 'chess-coach-mistakes-v1';
  var KEY_ATTEMPTS = 'chess-coach-attempts-v1';
  var KEY_RATING = 'chess-coach-user-rating-v1';
  var KEY_RATING_HISTORY = 'chess-coach-rating-history-v1';
  var KEY_RATING_PROFILE = 'chess-coach-rating-profile-v1';   // Spec 24: peak/RD/record/tactics
  var KEY_SCORECARDS = 'chess-coach-game-scorecards-v1';
  function loadJson(key, fb) { try { var r = localStorage.getItem(key); if (r == null) return fb; var v = JSON.parse(r); return v == null ? fb : v; } catch (e) { return fb; } }
  function esc(s) { return String(s == null ? '' : s).replace(/[&<>"]/g, function (c) { return ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' })[c]; }); }

  var mistakes, attempts, ratingCache, ratingHistory, ratingProfile, scorecards, recognition;
  try {
    mistakes = loadJson(KEY_MISTAKES, []) || [];
    attempts = loadJson(KEY_ATTEMPTS, {}) || {};
    ratingCache = loadJson(KEY_RATING, null);
    ratingHistory = loadJson(KEY_RATING_HISTORY, []) || [];
    ratingProfile = loadJson(KEY_RATING_PROFILE, null);
    scorecards = loadJson(KEY_SCORECARDS, {}) || {};
    recognition = loadJson('chess-coach-recognition-v1', {}) || {};
  } catch (e) {
    root.innerHTML = '<div class="ebanner"><div class="t">Insights could not read your saved data.</div><div class="raw">' + esc((e && e.stack) || String(e)) + '</div></div>';
    return;
  }
  var currentRating = (ratingCache && typeof ratingCache.rating === 'number') ? ratingCache.rating : null;
  var TARGET = (typeof KPProfile!=='undefined'?KPProfile.targetElo():1500);

  // App-level session streak (single-sourced via js/streak.js — same module
  // today.html writes). Read-only here: resolve the elapsed gap for an honest
  // display value, but never mark a completion from Insights.
  var streakInfo = { current: 0, freezesAvailable: 0, message: '' };
  try {
    if (typeof Streak !== 'undefined') {
      streakInfo = Streak.describe(Streak.resolve(Streak.readStreak(), Streak.todayStr()).state, Streak.todayStr());
    }
  } catch (e) { /* streak is non-essential chrome */ }
  var streak = streakInfo.current;

  var phases = null, view = null;
  try {
    if (typeof CoachStats !== 'undefined') {
      phases = CoachStats.phaseScores(scorecards);
      view = CoachStats.computeCoachView({ rating: currentRating, mistakes: mistakes, attempts: attempts, scorecards: scorecards, nowMs: Date.now() });
    }
  } catch (e) { phases = null; }

  var PHASE_META = { opening: { label: 'Opening', col: 'var(--open)' }, middlegame: { label: 'Middlegame', col: 'var(--middle)' }, endgame: { label: 'Endgame', col: 'var(--endg)' } };
  var PHASE_NAME = { opening: 'opening', middlegame: 'middlegame', endgame: 'endgame' };

  function ratingStripHtml() {
    var val = (currentRating != null) ? currentRating : '—';
    var meta = 'Chess.com rapid';
    if (currentRating != null) { var gap = TARGET - currentRating; meta += gap > 0 ? ' · ' + gap + ' to 1500' : gap === 0 ? ' · at 1500' : ' · ' + (-gap) + ' above 1500'; }
    else { meta = 'Sync your rating in Puzzles.'; }
    if (streak > 0) meta += ' · 🔥 ' + streak;
    return '<div class="ratestrip"><div><div class="rating-value">' + val + '</div><div class="rating-meta" id="rating-meta">' + esc(meta) + '</div></div><div class="traj-wrap" id="traj-wrap"></div></div>';
  }
  function renderTrajectory() {
    var wrap = $('traj-wrap'); if (!wrap) return;
    var points = ratingHistory.slice();
    if (currentRating != null) { var last = points[points.length - 1]; if (!last || last.rating !== currentRating) points.push({ rating: currentRating, at: new Date().toISOString() }); }
    if (points.length < 2) { wrap.innerHTML = '<div class="traj-empty">Trajectory builds as your rating moves — sync a few games.</div>'; return; }
    var ratings = points.map(function (p) { return p.rating; });
    // Scale to the DATA range (NOT the 1500 target). Including TARGET squashed a
    // 950–1100 player's line into a flat sliver — the movement was invisible.
    var dMin = Math.min.apply(null, ratings), dMax = Math.max.apply(null, ratings);
    var span = Math.max(20, dMax - dMin);          // floor so a small move isn't a hairline
    var pad = span * 0.30, yMin = dMin - pad, yMax = dMax + pad;
    var W = 320, H = 46, PADT = 5, PADB = 5, innerH = H - PADT - PADB;
    var xOf = function (i) { return (i / (points.length - 1)) * W; };
    var yOf = function (r) { return PADT + (1 - (r - yMin) / (yMax - yMin)) * innerH; };
    var d = points.map(function (p, i) { return (i === 0 ? 'M' : 'L') + xOf(i).toFixed(1) + ',' + yOf(p.rating).toFixed(1); }).join(' ');
    // Target line only if 1500 actually falls in the visible band (else it would
    // re-squash the data); the strip already shows "X to 1500".
    var targetLine = (TARGET >= yMin && TARGET <= yMax)
      ? '<line x1="0" y1="' + yOf(TARGET).toFixed(1) + '" x2="' + W + '" y2="' + yOf(TARGET).toFixed(1) + '" stroke="#1F9D57" stroke-width="1" stroke-dasharray="3,4" opacity=".5"/>' : '';
    var net = ratings[ratings.length - 1] - ratings[0];
    var cap = (net === 0 ? 'Holding steady' : (net > 0 ? '▲ +' + net : '▼ ' + net)) + ' over your last ' + points.length + ' snapshots';
    wrap.innerHTML = '<svg viewBox="0 0 ' + W + ' ' + H + '" preserveAspectRatio="none" aria-label="Rating trajectory">' +
      targetLine +
      '<path d="' + d + '" fill="none" stroke="var(--accent)" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>' +
      points.map(function (p, i) { return '<circle cx="' + xOf(i).toFixed(1) + '" cy="' + yOf(p.rating).toFixed(1) + '" r="2.2" fill="var(--accent)"/>'; }).join('') + '</svg>' +
      '<div class="traj-cap" style="font-size:10.5px;color:var(--muted);margin-top:2px;text-align:right;">' + esc(cap) + '</div>';
  }

  // ---- rating profile block (C-surface payoff): peak / record / tactics / RD ----
  // Reads chess-coach-rating-profile-v1 via CoachStats.ratingProfileView. Every
  // field degrades gracefully when absent; the settledness note hedges gains
  // honestly when RD is high. No fabrication — only renders what the store holds.
  function ratingBlockHtml() {
    if (typeof CoachStats === 'undefined') return '';
    var pv;
    try { pv = CoachStats.ratingProfileView(ratingProfile); } catch (e) { return ''; }
    if (!pv || !pv.hasAny) return '';   // capture layer hasn't run yet -> show nothing

    var r = pv.rapid;
    function statCard(k, val, extra) {
      var muted = (val == null);
      return '<div class="rc-stat"><div class="k">' + esc(k) + '</div><div class="v' + (muted ? ' muted' : '') + '">' + (val == null ? '—' : val) + '</div>' + (extra ? '<div class="x">' + esc(extra) + '</div>' : '') + '</div>';
    }
    // current rapid (prefer the live cache; fall back to the profile)
    var curRapid = (currentRating != null) ? currentRating : r.current;
    var peak = r.best;
    var peakX = (peak != null && curRapid != null) ? (curRapid >= peak ? 'at your peak' : (peak - curRapid) + ' below peak') : '';
    var rec = r.record;
    var recVal = rec ? (rec.w + '–' + rec.l + '–' + rec.d) : null;
    var recX = (rec && rec.winPct != null) ? (rec.winPct + '% wins · ' + rec.total + ' rapid games') : '';
    var tac = pv.tactics;

    var cards = '<div class="rc-grid">' +
      statCard('Rapid', curRapid != null ? curRapid : null, (curRapid != null ? (TARGET - curRapid > 0 ? (TARGET - curRapid) + ' to 1500' : 'at/above 1500') : '')) +
      statCard('Peak', peak != null ? peak : null, peakX) +
      statCard('Record (W–L–D)', recVal, recX) +
      statCard('Tactics', tac != null ? tac : null, tac != null ? 'Chess.com puzzles' : '') +
      '</div>';

    // settledness note from RD (honest hedge)
    var settle = '';
    var s = r.settledness;
    if (s && s.known) {
      settle = '<div class="rc-settle ' + (s.settled ? 'settled' : 'settling') + '"><b>' +
        (s.settled ? 'Settled' : 'Still settling') + '</b> (RD ' + s.rd + '). ' + esc(s.note) + '</div>';
    }

    // honest causal framing — ONLY when rating history clearly supports it.
    var causal = causalNote();

    var when = pv.fetchedAt ? ('Synced ' + relTime(pv.fetchedAt)) : '';
    return '<div class="ratecard"><div class="rc-head"><span class="rc-title">Your Chess.com rating</span>' +
      (when ? '<span class="rc-when">' + esc(when) + '</span>' : '') + '</div>' +
      cards + settle + causal + '</div>';
  }
  function relTime(iso) {
    var t = Date.parse(iso); if (isNaN(t)) return '';
    var days = Math.floor((Date.now() - t) / 86400000);
    if (days <= 0) return 'today'; if (days === 1) return 'yesterday'; if (days < 30) return days + ' days ago';
    return 'a while ago';
  }
  // Causal note: compute the rapid delta over recent rated history. Only assert a
  // link when the trend is real (>= 2 snapshots, a meaningful positive move).
  function causalNote() {
    var pts = (ratingHistory || []).filter(function (p) { return p && typeof p.rating === 'number'; });
    if (currentRating != null) { var last = pts[pts.length - 1]; if (!last || last.rating !== currentRating) pts = pts.concat([{ rating: currentRating, at: new Date().toISOString() }]); }
    if (pts.length < 2) return '';
    var first = pts[0].rating, lastR = pts[pts.length - 1].rating;
    var delta = lastR - first;
    if (delta >= 15) return '<div class="rc-causal">Up <b>+' + delta + '</b> across your tracked snapshots — the training is showing up in your rating.</div>';
    if (delta <= -15) return '<div class="rc-causal">Down ' + delta + ' lately — a dip is normal; keep clearing your mistake queue and it tends to recover.</div>';
    return '<div class="rc-causal">Holding steady across your tracked snapshots.</div>';
  }

  function leakOf() {
    if (!phases) return null;
    var ok = ['opening', 'middlegame', 'endgame'].filter(function (p) { return phases[p] && phases[p].status === 'ok'; });
    if (!ok.length) return null;
    ok.sort(function (a, b) { return phases[a].score - phases[b].score; });
    var leak = ok[0], best = ok[ok.length - 1];
    var impact = null;
    if (ok.length >= 2) { var gap = phases[best].score - phases[leak].score; if (gap >= 8) impact = Math.round(gap * 3); }
    return { phase: leak, best: best, impact: impact };
  }
  function ahaHtml(leak) {
    if (!leak) return '<div class="aha">Still calibrating your phase scores.</div><div class="ahasub">Ingest a few more games and your opening / middlegame / endgame scores sharpen up.</div>';
    var leakName = PHASE_NAME[leak.phase];
    var bestStrong = phases[leak.best] && phases[leak.best].score >= 70 && leak.best !== leak.phase;
    var lead = bestStrong
      ? "You're solid in the " + PHASE_NAME[leak.best] + ' — the rating is leaking in the <span class="leakw">' + leakName + '</span>.'
      : 'Your rating is leaking most in the <span class="leakw">' + leakName + '</span>.';
    var n = (scorecards && typeof scorecards === 'object') ? Object.keys(scorecards).length : 0;
    return '<div class="aha">' + lead + '</div><div class="ahasub">Three phase scores from your last ' + n + ' game' + (n === 1 ? '' : 's') + '.</div>';
  }
  function phaseCardsHtml(leak) {
    var ri = (typeof CoachStats !== 'undefined' && phases) ? CoachStats.perPhaseRatingImpact(phases) : null;
    var order = ['opening', 'middlegame', 'endgame'];
    return '<div class="phases">' + order.map(function (p) {
      var m = PHASE_META[p], d = phases ? phases[p] : null;
      var isLeak = leak && leak.phase === p;
      if (!d || d.status === 'no data') {
        return '<div class="phase"><span class="topdot" style="background:' + m.col + '"></span><div class="top">' + m.label + '</div><div class="score" style="color:var(--muted)">—</div><div class="sub">No games reaching this phase yet.</div></div>';
      }
      if (d.status === 'calibrating') {
        return '<div class="phase"><span class="topdot" style="background:' + m.col + '"></span><div class="top">' + m.label + '</div><div class="calib-ring"></div><div class="sub">Calibrating — needs a few more games before this score is trustworthy.</div></div>';
      }
      var flag = isLeak ? '<span class="flag">Biggest leak</span>' : '';
      var riPhase = ri ? ri[p] : null;
      var impact = '';
      if (riPhase) {
        if (riPhase.isBest) {
          impact = '<div class="impact">your ' + p + ' plays like a ≈' + riPhase.eloEquivalent + ' player</div>';
        } else if (riPhase.ratingImpact > 0) {
          impact = '<div class="impact">≈ −' + riPhase.ratingImpact + ' rating points behind your best</div>';
        }
      }
      var sub = d.tier + ' · avg ' + d.acpl + ' cp · ' + d.moves + ' moves';
      return '<div class="phase' + (isLeak ? ' leak' : '') + '">' + flag + '<span class="topdot" style="background:' + m.col + '"></span>' +
        '<div class="top">' + m.label + '</div><div class="score anim-score" data-score="' + Math.round(d.score) + '" style="color:' + m.col + '">0</div>' +
        '<div class="bar"><i style="width:' + Math.round(d.score) + '%;background:' + m.col + '"></i></div>' +
        '<div class="sub">' + sub + '</div>' + impact + '</div>';
    }).join('') + '</div>';
  }

  var ATTR_LABELS = { tactical_patterns: 'Tactical patterns', king_safety: 'King safety', endgame_technique: 'Endgame technique', opening_principles: 'Opening principles', calculation: 'Calculation', piece_activity: 'Piece activity', pawn_structure: 'Pawn structure' };
  var PHASE_GROUPS = [
    { phase: 'opening', attrs: ['opening_principles'] },
    { phase: 'middlegame', attrs: ['tactical_patterns', 'calculation', 'piece_activity', 'pawn_structure', 'king_safety'] },
    { phase: 'endgame', attrs: ['endgame_technique'] }
  ];
  function compRow(attr) {
    var a = (view && view.attributes && view.attributes[attr]) || { status: 'no data' };
    var label = ATTR_LABELS[attr] || attr;
    var ti;
    if (a.status === 'ok') ti = '<span class="ti">' + (a.tier || '—') + ' · ' + Math.round(a.score) + '%</span>';
    else if (a.status === 'calibrating') ti = '<span class="ti calib">calibrating</span>';
    else ti = '<span class="ti nodata">no data yet</span>';
    return '<div class="comp"><span class="nm">' + esc(label) + '</span>' + ti + '</div>';
  }
  function detailHtml() {
    var overall = (view && view.overall && view.overall.tier) ? ('Overall: <b>' + view.overall.tier + '</b> · median of the seven') : 'Overall: calibrating';
    var groups = PHASE_GROUPS.map(function (g) {
      var m = PHASE_META[g.phase];
      return '<div class="cgrp"><div class="gh" style="color:' + m.col + '"><i style="background:' + m.col + '"></i>' + m.label + '</div>' + g.attrs.map(compRow).join('') + '</div>';
    }).join('');
    return '<div class="panel"><div class="ph2"><span class="panel-title">The detail</span><span class="ov">' + overall + '</span></div>' + groups + '</div>';
  }

  var CPLOSS_MISTAKE = 30;
  var HEAT_BANDS = [[1,5],[6,10],[11,15],[16,20],[21,25],[26,30],[31,999]];
  var PHASE_VAR = { opening: 'var(--open)', middlegame: 'var(--middle)', endgame: 'var(--endg)' };
  function bandLabel(lo, hi) { return hi >= 999 ? (lo + '+') : (lo + '-' + hi); }
  function legendHtml() { return '<div class="phaselegend"><span><i style="background:var(--open)"></i>Opening</span><span><i style="background:var(--middle)"></i>Middlegame</span><span><i style="background:var(--endg)"></i>Endgame</span></div>'; }
  function heatmapHtml() {
    var cards = (scorecards && typeof scorecards === 'object') ? Object.keys(scorecards).map(function (k) { return scorecards[k]; }) : [];
    if (!cards.length) return '<div class="empty-state" style="padding:8px 0; text-align:left;">No per-game data yet. Ingest a few games — this reads from the per-move scorecards built during analysis.</div>';
    var bands = HEAT_BANDS.map(function (r) { return { lo: r[0], hi: r[1], exposure: 0, mistakes: 0, phase: { opening: 0, middlegame: 0, endgame: 0 } }; });
    var hasCp = false;
    cards.forEach(function (sc) {
      var traj = (sc && Array.isArray(sc.evalTrajectory)) ? sc.evalTrajectory : [];
      traj.forEach(function (t) {
        var mv = typeof t.fullmove === 'number' ? t.fullmove : null; if (mv == null || mv < 1) return;
        var b = null; for (var i = 0; i < bands.length; i++) { if (mv >= bands[i].lo && mv <= bands[i].hi) { b = bands[i]; break; } } if (!b) return;
        b.exposure++; if (t.phase && b.phase[t.phase] != null) b.phase[t.phase]++;
        if (typeof t.cpLoss === 'number') { hasCp = true; if (t.cpLoss >= CPLOSS_MISTAKE) b.mistakes++; }
      });
    });
    var reached = bands.filter(function (b) { return b.exposure > 0; });
    if (!reached.length) return '<div class="empty-state" style="padding:8px 0; text-align:left;">No analysed moves recorded yet. Re-ingest your recent games.</div>';
    var first = bands.indexOf(reached[0]), last = bands.indexOf(reached[reached.length - 1]);
    var shown = bands.slice(first, last + 1);
    if (!hasCp) {
      var maxExp = Math.max.apply(null, shown.map(function (b) { return b.exposure; }).concat([1]));
      var bd = shown.map(function (b, i) {
        if (!b.exposure) return '<div class="band"><span class="pct none">-</span><div class="bar nodata" style="height:8%; animation-delay:' + (i * 0.05) + 's"></div><span class="lab">' + bandLabel(b.lo, b.hi) + '</span></div>';
        var h = Math.max(8, Math.round(b.exposure / maxExp * 100));
        return '<div class="band"><span class="pct none">·</span><div class="bar nodata" style="height:' + h + '%; animation-delay:' + (i * 0.05) + 's"></div><span class="lab">' + bandLabel(b.lo, b.hi) + '</span></div>';
      }).join('');
      return '<div class="bands">' + bd + '</div>' + legendHtml() + '<div class="heatnote">Your games were analysed before per-move loss tracking. <b>Re-ingest in the Games tab</b> to see your actual mistake rate by move.</div>';
    }
    var rateOf = function (b) { return b.exposure ? b.mistakes / b.exposure : null; };
    var maxRate = Math.max.apply(null, shown.map(function (b) { return rateOf(b) || 0; }).concat([0.0001]));
    function phaseOf(b) { var e = Object.keys(b.phase).map(function (k) { return [k, b.phase[k]]; }).sort(function (a, c) { return c[1] - a[1]; }); var top = (e[0] && e[0][1] > 0) ? e[0][0] : 'middlegame'; return (top === 'opening' && b.lo >= 11) ? 'middlegame' : top; }
    var bars = shown.map(function (b, i) {
      var lab = bandLabel(b.lo, b.hi);
      if (!b.exposure) return '<div class="band"><span class="pct none">-</span><div class="bar nodata" style="height:6%; animation-delay:' + (i * 0.05) + 's"></div><span class="lab">' + lab + '</span></div>';
      var rate = rateOf(b), pct = Math.round(rate * 100), h = Math.max(4, Math.round(rate / maxRate * 100)), col = PHASE_VAR[phaseOf(b)];
      return '<div class="band"><span class="pct">' + pct + '%</span><div class="bar" style="height:' + h + '%; background:' + col + '; animation-delay:' + (i * 0.05) + 's" title="Moves ' + lab + ': ' + b.mistakes + ' of ' + b.exposure + ' (' + pct + '%)"></div><span class="lab">' + lab + '</span></div>';
    }).join('');
    var pool = shown.filter(function (b) { return b.exposure >= 3; }); if (!pool.length) pool = shown.filter(function (b) { return b.exposure > 0; });
    var note = '';
    if (pool.length) { var worst = pool.slice().sort(function (a, b) { return rateOf(b) - rateOf(a); })[0]; var pn = { opening: 'the opening', middlegame: 'the middlegame', endgame: 'the endgame' }[phaseOf(worst)]; note = '<div class="heatnote"><b>Heaviest at moves ' + bandLabel(worst.lo, worst.hi) + '</b>, in ' + pn + '.</div>'; }
    return '<div class="bands">' + bars + '</div>' + legendHtml() + note;
  }

  function recognitionHtml() {
    var seen = (recognition && recognition.seen) || {};
    var ids = Object.keys(seen);
    if (!ids.length) return '';
    var correct = 0;
    ids.forEach(function (id) { var r = seen[id]; if (r && (r.correct === true || r === true)) correct++; });
    var pct = Math.round(100 * correct / ids.length);
    return '<div class="panel"><div class="heat-h"><span class="t">Recognition</span>'
      + '<span class="u">winning / drawn / losing judgement</span></div>'
      + '<div style="display:flex;align-items:baseline;gap:10px;padding:6px 2px 2px;">'
      + '<span class="anim-score" data-score="' + pct + '" style="font-family:\'Plus Jakarta Sans\',sans-serif;font-size:30px;font-weight:800;color:var(--ink);line-height:1;">' + pct + '</span>'
      + '<span style="font-size:14px;font-weight:700;color:var(--muted);">% correct</span>'
      + '<span style="margin-left:auto;font-size:12px;color:var(--muted);">' + correct + ' / ' + ids.length + ' positions</span></div></div>';
  }

  // Chess.com performance panel (v0.80, owner ask): the per-game performance
  // estimate ("what level did you actually play at") and what it means, plus
  // the aggregate reads the meta capture supports — record, colour split,
  // accuracy when chess.com reviewed the game, how you lose, opening scores.
  function chesscomHtml() {
    if (typeof ChesscomInsights === 'undefined') return '';
    var metaMap = loadJson('chess-coach-game-meta-v1', {}) || {};
    var series = ChesscomInsights.perfSeries(metaMap);
    var sum = ChesscomInsights.summarize(metaMap);
    if (!sum.games) return '';
    var parts = [];
    // -- chart: per-game performance dots/line vs your current rating --
    if (series.length >= 3) {
      var pts = series.slice(-20);
      var w = 560, h = 110, pad = 8;
      var vals = pts.map(function (p) { return p.perf; });
      if (currentRating != null) vals.push(currentRating);
      var lo = Math.min.apply(null, vals) - 30, hi = Math.max.apply(null, vals) + 30;
      var x = function (i) { return pad + i * ((w - 2 * pad) / Math.max(1, pts.length - 1)); };
      var y = function (v) { return h - pad - ((v - lo) / Math.max(1, hi - lo)) * (h - 2 * pad); };
      var line = pts.map(function (p, i) { return x(i).toFixed(1) + ',' + y(p.perf).toFixed(1); }).join(' ');
      var dots = pts.map(function (p, i) {
        var col = p.res === 'win' ? 'var(--pos)' : p.res === 'loss' ? 'var(--bad)' : 'var(--muted)';
        return '<circle cx="' + x(i).toFixed(1) + '" cy="' + y(p.perf).toFixed(1) + '" r="3" fill="' + col + '"><title>' + p.perf + ' (' + (p.res || '') + ')</title></circle>';
      }).join('');
      var ratingLine = (currentRating != null)
        ? '<line x1="' + pad + '" y1="' + y(currentRating).toFixed(1) + '" x2="' + (w - pad) + '" y2="' + y(currentRating).toFixed(1) + '" stroke="var(--muted)" stroke-dasharray="4 4" stroke-width="1"/><text x="' + (w - pad) + '" y="' + (y(currentRating) - 4).toFixed(1) + '" text-anchor="end" font-size="9" fill="var(--muted)">your rating ' + currentRating + '</text>'
        : '';
      parts.push('<svg viewBox="0 0 ' + w + ' ' + h + '" style="width:100%;height:auto;display:block;margin-top:6px;" role="img" aria-label="Per-game performance estimate">' +
        ratingLine +
        '<polyline points="' + line + '" fill="none" stroke="var(--accent)" stroke-width="1.6" opacity=".55"/>' + dots + '</svg>');
      var meaning = ChesscomInsights.perfMeaning(sum.recentPerf, currentRating);
      if (meaning) parts.push('<div class="heatnote"><b>Recent performance: ~' + sum.recentPerf + '.</b> ' + esc(meaning) + '</div>');
    }
    // -- facts --
    var facts = [];
    facts.push('Record: <b>' + sum.wins + 'W ' + sum.draws + 'D ' + sum.losses + 'L</b>' + (sum.avgOpp ? ' vs ~' + sum.avgOpp + '-rated opponents' : ''));
    if (sum.byColor.white.n >= 3 && sum.byColor.black.n >= 3) {
      facts.push('As White you win <b>' + Math.round(100 * sum.byColor.white.w / sum.byColor.white.n) + '%</b>, as Black <b>' + Math.round(100 * sum.byColor.black.w / sum.byColor.black.n) + '%</b>');
    }
    if (sum.accAvg != null) facts.push('Avg accuracy <b>' + sum.accAvg + '%</b>' + (sum.accOppAvg != null ? ' (opponents ' + sum.accOppAvg + '%)' : '') + ' · from ' + sum.accCount + ' chess.com-reviewed game' + (sum.accCount === 1 ? '' : 's'));
    var terms = Object.keys(sum.lossTerminations).map(function (t) { return [t, sum.lossTerminations[t]]; }).sort(function (a, b) { return b[1] - a[1]; });
    if (terms.length && sum.losses >= 3) {
      var label = { checkmated: 'checkmate', timeout: 'the clock', resigned: 'resignation', abandoned: 'abandoning' }[terms[0][0]] || terms[0][0];
      facts.push('Most of your losses end by <b>' + esc(label) + '</b> (' + terms[0][1] + ' of ' + sum.losses + ')');
    }
    var played = sum.openings.filter(function (o) { return o.n >= 3; });
    if (played.length >= 2) {
      var best = played.slice().sort(function (a, b) { return b.scorePct - a.scorePct; })[0];
      var worstO = played.slice().sort(function (a, b) { return a.scorePct - b.scorePct; })[0];
      if (best !== worstO) facts.push('Best opening: <b>' + esc(best.name) + '</b> (' + best.scorePct + '% over ' + best.n + ') · worst: <b>' + esc(worstO.name) + '</b> (' + worstO.scorePct + '%)');
    }
    var factHtml = facts.map(function (f) { return '<div style="font-size:12.5px;padding:7px 0;border-top:1px solid var(--surface2);">' + f + '</div>'; }).join('');
    return '<div class="panel"><div class="heat-h"><span class="t">Game-by-game performance</span><span class="u">from your chess.com games · win green, loss red</span></div>' +
      parts.join('') + '<div style="margin-top:10px;">' + factHtml + '</div></div>';
  }

  // Mastery over time (2026-06-10, owner ask): per-type progress so improvement
  // is VISIBLE. Weekly trend where per-attempt timestamps exist (tactics via the
  // attempts ledger's attemptLog, recognition via seen{at,correct}); honest
  // snapshot chips for stores that only keep current state (endgames mastered,
  // openings SRS boxes, board-vision level).
  function masteryHtml() {
    var WEEKS = 8, now = Date.now(), WK = 7 * 86400000;
    function weekIdx(t) { var d = Math.floor((now - t) / WK); return (d >= 0 && d < WEEKS) ? (WEEKS - 1 - d) : null; }
    function trendRow(label, buckets, color) {
      var any = buckets.some(function (b) { return b.n > 0; });
      if (!any) return '';
      var bars = buckets.map(function (b, i) {
        var pct = b.n ? Math.round(100 * b.ok / b.n) : null;
        var h = pct == null ? 8 : Math.max(10, pct);
        var bg = pct == null ? 'var(--surface3)' : color;
        var tip = pct == null ? 'no attempts' : pct + '% of ' + b.n;
        return '<div title="' + tip + '" style="flex:1;display:flex;flex-direction:column;justify-content:flex-end;height:46px;"><div style="height:' + h + '%;background:' + bg + ';border-radius:3px 3px 0 0;"></div></div>';
      }).join('');
      var last = null;
      for (var i = buckets.length - 1; i >= 0; i--) if (buckets[i].n) { last = Math.round(100 * buckets[i].ok / buckets[i].n); break; }
      return '<div style="display:flex;align-items:center;gap:12px;padding:8px 0;border-top:1px solid var(--line);">' +
        '<div style="width:96px;font-size:12px;font-weight:700;">' + label + '</div>' +
        '<div style="flex:1;display:flex;gap:3px;align-items:flex-end;">' + bars + '</div>' +
        '<div style="width:44px;text-align:right;font-size:13px;font-weight:800;font-family:\'Plus Jakarta Sans\',sans-serif;">' + (last == null ? '—' : last + '%') + '</div></div>';
    }
    // Tactics: every attemptLog entry across mistake + lichess puzzles.
    var tac = []; for (var w = 0; w < WEEKS; w++) tac.push({ n: 0, ok: 0 });
    Object.keys(attempts).forEach(function (id) {
      var log = attempts[id] && attempts[id].attemptLog;
      if (!Array.isArray(log)) return;
      log.forEach(function (e) {
        var t = e && Date.parse(e.at); if (!t) return;
        var wi = weekIdx(t); if (wi == null) return;
        tac[wi].n++; if (e.outcome === 'solved') tac[wi].ok++;
      });
    });
    // Recognition: seen{id:{at,correct}}.
    var rec = []; for (var w2 = 0; w2 < WEEKS; w2++) rec.push({ n: 0, ok: 0 });
    var seenMap = (recognition && recognition.seen) || {};
    Object.keys(seenMap).forEach(function (id) {
      var r = seenMap[id]; var t = (r && typeof r === 'object') ? r.at : r;
      if (typeof t !== 'number') return;
      var wi = weekIdx(t); if (wi == null) return;
      rec[wi].n++; if (r && r.correct === true) rec[wi].ok++;
    });
    var rows = trendRow('Tactics', tac, 'var(--accent)') + trendRow('Recognition', rec, 'var(--endg)');
    // Snapshot chips.
    var chips = [];
    try {
      var eg = loadJson('chess-coach-eg-results-v1', {}) || {};
      var mastered = Object.keys(eg).filter(function (k) { return eg[k] && eg[k].mastered; }).length;
      if (Object.keys(eg).length) chips.push('Endgames: <b>' + mastered + '/20 mastered</b>');
    } catch (e) {}
    try {
      var op = loadJson('chess-coach-openings-v1', {}) || {};
      var lines = Object.keys(op).filter(function (k) { return op[k] && typeof op[k].box === 'number'; });
      if (lines.length) {
        var solid = lines.filter(function (k) { return op[k].box >= 4; }).length;
        chips.push('Openings: <b>' + solid + '/' + lines.length + ' lines solid</b>');
      }
    } catch (e) {}
    try {
      var bv = loadJson('chess-coach-board-vision-v1', null);
      if (bv && bv.tracker && bv.tracker.level) chips.push('Board vision: <b>level ' + bv.tracker.level + '/6</b>');
    } catch (e) {}
    var chipRow = chips.length
      ? '<div style="display:flex;flex-wrap:wrap;gap:8px;padding-top:10px;">' + chips.map(function (c) { return '<span style="font-size:12px;padding:5px 11px;border:1px solid var(--line);border-radius:var(--r-pill);background:var(--surface2);">' + c + '</span>'; }).join('') + '</div>'
      : '';
    if (!rows && !chipRow) return '';
    return '<div class="panel"><div class="heat-h"><span class="t">Mastery over time</span><span class="u">weekly accuracy per training type · last 8 weeks</span></div>' + rows + chipRow + '</div>';
  }

  // RENDER
  if (!phases) {
    root.innerHTML = ratingStripHtml() + ratingBlockHtml() + '<div class="panel"><div class="empty-state">Stats module failed to load. Reload the page; if it persists, check the browser console.</div></div>';
    renderTrajectory();
    return;
  }
  var anyPhase = ['opening', 'middlegame', 'endgame'].some(function (p) { return phases[p] && phases[p].status !== 'no data'; });
  if (!anyPhase) {
    // No analysed games yet — a clear, prominent prompt (not a sparse "—" strip).
    var hasRating = currentRating != null;
    root.innerHTML =
      (hasRating ? ratingStripHtml() : '') +
      '<div class="panel"><div class="empty-state" style="padding:30px 20px;">' +
        '<div style="font-size:30px;margin-bottom:8px;">📊</div>' +
        '<div style="font-size:15px;font-weight:700;color:var(--ink);font-family:\'Plus Jakarta Sans\',sans-serif;margin-bottom:6px;">Sync your games to unlock Insights</div>' +
        'Connect Chess.com and the coach analyses your games — your rating trajectory, phase strengths, and exactly where you go wrong.' +
        '<br><a class="btn" href="/games.html">Sync games</a>' +
      '</div></div>' +
      masteryHtml(); // puzzle/recognition progress exists independently of game ingests
    if (hasRating) renderTrajectory();
    return;
  }

  var leak = leakOf();
  root.innerHTML =
    ratingStripHtml() +
    ratingBlockHtml() +
    chesscomHtml() +
    ahaHtml(leak) +
    phaseCardsHtml(leak) +
    detailHtml() +
    masteryHtml() +
    recognitionHtml() +
    '<div class="panel"><div class="heat-h"><span class="t">Where you go wrong</span><span class="u">mistake rate per 5-move band · phase-coloured</span></div>' + heatmapHtml() + '</div>' +
    '<a href="/coach.html" class="review1"><span class="ava"></span><div class="tx"><b>Your leak, in detail.</b> The full strengths &amp; weaknesses read is in Coach.</div><span class="go">Open →</span></a>';
  renderTrajectory();

  // Odometer animation
  var animScores = root.querySelectorAll('.anim-score');
  animScores.forEach(function(el) {
    var target = parseInt(el.getAttribute('data-score'), 10);
    if (isNaN(target)) return;
    var startTimestamp = null;
    var duration = 1200; // 1.2s
    var step = function(timestamp) {
      if (!startTimestamp) startTimestamp = timestamp;
      var progress = Math.min((timestamp - startTimestamp) / duration, 1);
      // easeOutExpo
      var ease = progress === 1 ? 1 : 1 - Math.pow(2, -10 * progress);
      el.textContent = Math.floor(ease * target);
      if (progress < 1) window.requestAnimationFrame(step);
    };
    window.requestAnimationFrame(step);
  });
})();
</script>
<script type="module" src="/js/puzzle/config.js"></script>
</body>
</html>
